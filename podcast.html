<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Street Stage – STREETART.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ── NAVBAR ── */
        .pcast-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 3000;
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1a1a1a;
        }
        .pcast-nav .logo-wrap { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .pcast-nav img { height: 28px; }
        .pcast-nav .site-name { font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .pcast-nav .page-title {
            margin-left: auto; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 2px; color: #E50914; text-transform: uppercase;
        }

        /* ── BODY ── */
        body { margin: 0; padding: 0; background: #080808; color: #fff;
               font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* ── INLINE VIDEO PLAYER ── */
        #stage-wrapper {
            margin-top: 53px;
            position: relative;
            background: #000;
            display: none; /* hidden until first click */
        }
        #stage-wrapper.visible { display: block; }

        #stage-wrapper .close-btn {
            position: absolute; top: 8px; right: 8px; z-index: 10;
            background: rgba(0,0,0,0.65); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
        }

        #yt-frame {
            width: 100%; aspect-ratio: 16/9;
            max-height: 56vw; border: none; display: block;
        }

        .now-playing-bar {
            background: #111; padding: 10px 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .now-playing-bar .np-thumb {
            width: 40px; height: 40px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
        }
        .now-playing-bar .np-info { flex: 1; overflow: hidden; }
        .now-playing-bar .np-title {
            font-size: 0.82rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .now-playing-bar .np-host { font-size: 0.68rem; color: #888; }
        .now-playing-bar .np-badge {
            font-size: 0.6rem; font-weight: 800; letter-spacing: 1px;
            color: #E50914; background: rgba(229,9,20,0.12);
            border: 1px solid rgba(229,9,20,0.25);
            padding: 2px 8px; border-radius: 99px; flex-shrink: 0;
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            position: sticky; top: 53px; z-index: 200;
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #1a1a1a;
            overflow-x: auto;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0; background: #1a1a1a; color: #888;
            border: 1px solid #2a2a2a; border-radius: 20px;
            padding: 7px 18px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .filter-chip.active { background: #E50914; color: #fff; border-color: #E50914; }

        /* ── SECTION HEADER ── */
        .sec-header {
            padding: 22px 16px 10px;
            display: flex; align-items: baseline; gap: 10px;
        }
        .sec-header h2 {
            margin: 0; font-size: 1.05rem; font-weight: 800; letter-spacing: 0.5px;
        }
        .sec-header .count {
            font-size: 0.7rem; color: #555; font-weight: 600;
        }

        /* ── GRID ── */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 16px 120px;
        }

        @media (min-width: 600px) {
            .video-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 0 20px 100px; }
        }
        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* ── VIDEO CARD ── */
        .vcard {
            background: #111; border-radius: 10px; overflow: hidden;
            cursor: pointer; border: 1px solid #1c1c1c;
            transition: transform 0.2s, border-color 0.2s;
        }
        .vcard:hover { transform: translateY(-4px); border-color: #333; }
        .vcard:active { transform: scale(0.97); }

        .vcard-thumb {
            position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden;
        }
        .vcard-thumb img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.35s;
        }
        .vcard:hover .vcard-thumb img { transform: scale(1.05); }

        /* red play overlay */
        .vcard-thumb .play-ol {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.35);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.25s;
        }
        .vcard:hover .play-ol { opacity: 1; }
        /* always visible on mobile */
        @media (max-width: 599px) { .vcard-thumb .play-ol { opacity: 1; background: rgba(0,0,0,0.1); } }

        .play-circle {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(229,9,20,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff;
            box-shadow: 0 0 20px rgba(229,9,20,0.5);
        }
        @media (max-width: 599px) { .play-circle { width: 30px; height: 30px; font-size: 0.7rem; } }

        /* duration badge */
        .duration-badge {
            position: absolute; bottom: 5px; right: 6px;
            background: rgba(0,0,0,0.75); color: #fff;
            font-size: 0.6rem; font-weight: 700; padding: 2px 5px;
            border-radius: 4px;
        }

        /* NOW PLAYING indicator on card */
        .vcard.playing .vcard-thumb::before {
            content: '';
            position: absolute; inset: 0;
            border: 3px solid #E50914; border-radius: 0; z-index: 2;
            pointer-events: none;
        }
        .vcard.playing .now-dot {
            display: flex !important;
        }
        .now-dot {
            display: none;
            position: absolute; top: 6px; left: 6px; z-index: 3;
            background: #E50914; color: #fff;
            font-size: 0.55rem; font-weight: 800; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 99px; align-items: center; gap: 4px;
        }
        .now-dot::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: #fff; animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .vcard-body { padding: 9px 10px 11px; }
        .vcard-title {
            font-size: 0.8rem; font-weight: 700; margin: 0 0 4px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; line-height: 1.35;
        }
        .vcard-host { font-size: 0.68rem; color: #666; font-weight: 600; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center; padding: 60px 20px; color: #444;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 14px; display: block; }
        .empty-state p { font-size: 0.85rem; }

        /* ── LOADING SKELETON ── */
        .skel-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; padding: 0 16px;
        }
        @media (min-width: 600px) { .skel-grid { grid-template-columns: repeat(3, 1fr); } }
        .skel-card { background: #111; border-radius: 10px; overflow: hidden; }
        .skel-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200%; animation: shimmer 1.4s infinite; }
        .skel-line { height: 11px; margin: 10px 10px 6px; border-radius: 4px; background: #1a1a1a; }
        .skel-line.short { width: 55%; margin-bottom: 12px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── BOTTOM NAV (from style.css override) ── */
        .tabbar-spacer { height: 60px; }

        /* ── FLOATING NOW-PLAYING BAR (fixed bottom, above tabbar) ── */
        #float-video-bar {
            position: fixed; bottom: 60px; left: 0; right: 0; z-index: 2000;
            background: rgba(18,18,18,0.97); backdrop-filter: blur(10px);
            border-top: 2px solid #E50914;
            display: none;
            animation: slideUp 0.3s ease;
        }
        #float-video-bar.visible { display: flex; flex-direction: column; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

        .fvb-inner {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 14px; cursor: pointer;
        }
        .fvb-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .fvb-info { flex: 1; overflow: hidden; }
        .fvb-title { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fvb-sub { font-size: 0.65rem; color: #E50914; font-weight: 700; letter-spacing: 1px; }
        .fvb-btn {
            background: #E50914; border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; cursor: pointer; flex-shrink: 0;
        }
        .fvb-close {
            background: none; border: none; color: #555;
            font-size: 0.9rem; cursor: pointer; padding: 4px 6px; flex-shrink: 0;
        }
        .fvb-progress { height: 2px; background: #1a1a1a; }
        .fvb-progress-fill { height: 100%; background: #E50914; width: 0%; }

        /* ── MUSIK LINK BANNER ── */
        .musik-banner {
            margin: 16px 16px 0;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
            border: 1px solid #222; border-left: 3px solid #1DB954;
            border-radius: 10px; padding: 12px 14px;
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; cursor: pointer;
            transition: 0.2s;
        }
        .musik-banner:hover { border-left-color: #1ed760; transform: translateX(3px); }
        .musik-banner .mb-icon { font-size: 1.4rem; color: #1DB954; flex-shrink: 0; }
        .musik-banner .mb-text .mb-label { font-size: 0.68rem; color: #1DB954; font-weight: 800; letter-spacing: 1px; }
        .musik-banner .mb-text .mb-desc { font-size: 0.8rem; font-weight: 700; color: #fff; margin-top: 2px; }
        .musik-banner .mb-arrow { margin-left: auto; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="pcast-nav">
        <a href="index.html" class="logo-wrap">
            <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/refs/heads/main/Logo_Stretart.png" alt="Logo">
            <span class="site-name">STREETART.ID</span>
        </a>
        <span class="page-title"><i class="fa-solid fa-clapperboard"></i> Street Stage</span>
    </nav>

    <!-- INLINE VIDEO PLAYER (hidden until click) -->
    <div id="stage-wrapper">
        <button class="close-btn" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
        <iframe id="yt-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="now-playing-bar">
            <img id="np-thumb" src="" class="np-thumb">
            <div class="np-info">
                <div class="np-title" id="np-title">-</div>
                <div class="np-host" id="np-host">-</div>
            </div>
            <span class="np-badge">▶ PLAYING</span>
        </div>
    </div>

    <!-- LINK KE MUSIK.HTML -->
    <a href="musik.html" class="musik-banner">
        <div class="mb-icon"><i class="fa-solid fa-headphones"></i></div>
        <div class="mb-text">
            <div class="mb-label">SMIPRO TUNES</div>
            <div class="mb-desc">Koleksi Musik & Audio → Buka Player</div>
        </div>
        <div class="mb-arrow"><i class="fa-solid fa-chevron-right"></i></div>
    </a>

    <!-- FILTER -->
    <div class="filter-bar">
        <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">Semua Video</button>
        <button class="filter-chip" data-filter="new" onclick="setFilter('new', this)">Terbaru</button>
        <button class="filter-chip" data-filter="old" onclick="setFilter('old', this)">Terlama</button>
    </div>

    <!-- SECTION HEADER -->
    <div class="sec-header">
        <h2><i class="fa-solid fa-clapperboard" style="color:#E50914; margin-right:6px;"></i>Street Stage</h2>
        <span class="count" id="vid-count"></span>
    </div>

    <!-- CONTENT -->
    <div id="content-area">
        <!-- skeleton loading -->
        <div class="skel-grid" id="skeleton">
            <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
            <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
            <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
            <div class="skel-card"><div class="skel-thumb"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
        </div>
        <div class="video-grid" id="video-grid" style="display:none;"></div>
    </div>

    <!-- FLOATING NOW-PLAYING BAR -->
    <div id="float-video-bar">
        <div class="fvb-inner" onclick="scrollToPlayer()">
            <img src="" id="fvb-thumb" class="fvb-thumb">
            <div class="fvb-info">
                <div class="fvb-title" id="fvb-title">-</div>
                <div class="fvb-sub">▶ SEDANG DIPUTAR</div>
            </div>
            <button class="fvb-btn" onclick="scrollToPlayer(event)"><i class="fa-solid fa-chevron-up"></i></button>
            <button class="fvb-close" onclick="closePlayer(event)"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="fvb-progress"><div class="fvb-progress-fill"></div></div>
    </div>

    <!-- BOTTOM TABBAR (reuse dari style.css) -->
    <div class="tabbar-spacer"></div>
    <nav class="bottom-tabbar">
        <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="schedule.html"><i class="fa-solid fa-calendar-days"></i><span>Jadwal</span></a>
        <a href="podcast.html" class="active"><i class="fa-solid fa-music"></i><span>Galeri</span></a>
        <a href="radio.html"><i class="fa-solid fa-tower-broadcast"></i><span>Radio</span></a>
        <a href="login.html"><i class="fa-solid fa-user"></i><span>Akun</span></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allVideos = [];
        let currentFilter = 'all';
        let activeCardId = null;

        // ── LOAD DATA ──
        async function loadVideos() {
            try {
                const snap = await getDocs(query(collection(db, "podcasts"), orderBy("timestamp", "desc")));
                allVideos = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.mediaType === 'video') allVideos.push({ id: doc.id, ...d });
                });
                renderGrid();
            } catch(e) {
                console.error("Error:", e);
                document.getElementById('skeleton').style.display = 'none';
                document.getElementById('video-grid').style.display = 'grid';
                document.getElementById('video-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <p>Gagal memuat konten.</p>
                    </div>`;
            }
        }

        // ── RENDER ──
        function renderGrid() {
            document.getElementById('skeleton').style.display = 'none';
            const grid = document.getElementById('video-grid');
            grid.style.display = 'grid';

            let items = [...allVideos];
            if (currentFilter === 'old') items.reverse();

            document.getElementById('vid-count').textContent = `${items.length} video`;

            if (items.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
                    <i class="fa-solid fa-video-slash"></i>
                    <p>Belum ada video tersedia.</p></div>`;
                return;
            }

            grid.innerHTML = items.map(d => {
                const ytId = d.youtubeId || extractYtId(d.link || '');
                const thumb = ytId
                    ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`
                    : (d.thumb || '');
                const isPlaying = d.id === activeCardId;
                return `
                <div class="vcard ${isPlaying ? 'playing' : ''}" id="card-${d.id}"
                    onclick="playVideo('${d.id}', '${ytId}', ${JSON.stringify(d.title)}, ${JSON.stringify(d.host || 'Admin')}, '${thumb}')">
                    <div class="vcard-thumb">
                        <span class="now-dot">LIVE</span>
                        <img src="${thumb}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
                        <div class="play-ol">
                            <div class="play-circle"><i class="fa-solid fa-play"></i></div>
                        </div>
                    </div>
                    <div class="vcard-body">
                        <div class="vcard-title">${d.title || 'Untitled'}</div>
                        <div class="vcard-host">${d.host || 'Admin'}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function extractYtId(url) {
            const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?\s]{11})/);
            return m ? m[1] : '';
        }

        // ── PLAY ──
        window.playVideo = function(id, ytId, title, host, thumb) {
            if (!ytId) { alert('Video tidak tersedia.'); return; }

            // Update active card
            document.querySelectorAll('.vcard').forEach(c => c.classList.remove('playing'));
            const card = document.getElementById('card-' + id);
            if (card) card.classList.add('playing');
            activeCardId = id;

            // Show player
            const wrap = document.getElementById('stage-wrapper');
            wrap.classList.add('visible');
            document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0`;

            // Update now-playing bar
            document.getElementById('np-thumb').src = thumb;
            document.getElementById('np-title').textContent = title;
            document.getElementById('np-host').textContent = host;

            // Update floating bar
            document.getElementById('fvb-thumb').src = thumb;
            document.getElementById('fvb-title').textContent = title;
            document.getElementById('float-video-bar').classList.add('visible');

            // Scroll ke player
            wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.closePlayer = function(e) {
            if (e) e.stopPropagation();
            document.getElementById('stage-wrapper').classList.remove('visible');
            document.getElementById('yt-frame').src = '';
            document.getElementById('float-video-bar').classList.remove('visible');
            document.querySelectorAll('.vcard').forEach(c => c.classList.remove('playing'));
            activeCardId = null;
        };

        window.scrollToPlayer = function(e) {
            if (e) e.stopPropagation();
            document.getElementById('stage-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        // ── FILTER ──
        window.setFilter = function(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        };

        // ── INIT ──
        loadVideos();
    </script>
</body>
</html>
