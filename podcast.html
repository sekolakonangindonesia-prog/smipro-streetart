<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Street Stage – STREETART.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{margin:0;padding:0;background:#080808;color:#fff;font-family:'Segoe UI',sans-serif;overflow-x:hidden}
        .pcast-nav{position:fixed;top:0;left:0;right:0;z-index:3000;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.94);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a}
        .btn-back{background:none;border:none;color:#fff;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:700;padding:4px 8px 4px 0;white-space:nowrap;text-decoration:none}
        .nav-div{width:1px;height:20px;background:#2a2a2a;flex-shrink:0}
        .nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none}
        .nav-logo img{height:26px}
        .nav-logo span{font-size:0.82rem;font-weight:800;letter-spacing:1px;color:#fff}
        .nav-tag{margin-left:auto;font-size:0.7rem;font-weight:800;letter-spacing:2px;color:#E50914;white-space:nowrap}
        #stage-wrapper{margin-top:0;position:relative;background:#000;display:none}
        #stage-wrapper.visible{display:block}
        #yt-frame{width:100%;aspect-ratio:16/9;border:none;display:block}
        .close-btn{position:absolute;top:8px;right:8px;z-index:10;background:rgba(0,0,0,0.7);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center}
        .now-bar{background:#111;padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a}
        .now-bar img{width:38px;height:38px;border-radius:5px;object-fit:cover;flex-shrink:0}
        .nb-info{flex:1;overflow:hidden}
        .nb-title{font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .nb-host{font-size:0.66rem;color:#666}
        .nb-badge{font-size:0.58rem;font-weight:800;letter-spacing:1px;background:rgba(229,9,20,0.12);color:#E50914;border:1px solid rgba(229,9,20,0.25);padding:2px 8px;border-radius:99px;flex-shrink:0;display:flex;align-items:center;gap:4px}
        .nb-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#E50914;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        .filter-bar{position:sticky;top:53px;z-index:200;display:flex;gap:8px;padding:9px 14px;background:rgba(8,8,8,0.96);backdrop-filter:blur(8px);border-bottom:1px solid #1a1a1a;overflow-x:auto}
        .filter-bar::-webkit-scrollbar{display:none}
        .f-chip{flex-shrink:0;padding:6px 16px;border-radius:20px;background:#181818;border:1px solid #282828;color:#777;font-size:0.76rem;font-weight:700;cursor:pointer;transition:0.18s;white-space:nowrap}
        .f-chip.active{background:#E50914;color:#fff;border-color:#E50914}
        .sec-hdr{padding:18px 14px 8px;display:flex;align-items:baseline;gap:10px}
        .sec-hdr h2{margin:0;font-size:1rem;font-weight:800}
        .sec-hdr .cnt{font-size:0.68rem;color:#444}
        .video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px 130px}
        @media(min-width:580px){.video-grid{grid-template-columns:repeat(3,1fr);gap:13px}}
        @media(min-width:860px){.video-grid{grid-template-columns:repeat(4,1fr)}}
        .vcard{background:#111;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1c1c1c;transition:transform 0.2s,border-color 0.2s}
        .vcard:hover{transform:translateY(-3px);border-color:#2e2e2e}
        .vcard:active{transform:scale(0.97)}
        .vcard.playing{border-color:#E50914}
        .vcard-thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden}
        .vcard-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;display:block}
        .vcard:hover .vcard-thumb img{transform:scale(1.04)}
        .play-ol{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);opacity:0;transition:opacity 0.2s}
        .vcard:hover .play-ol{opacity:1}
        @media(max-width:579px){.play-ol{opacity:1;background:rgba(0,0,0,0.05)}}
        .play-circle{width:38px;height:38px;border-radius:50%;background:rgba(229,9,20,0.9);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:#fff;box-shadow:0 0 18px rgba(229,9,20,0.45)}
        @media(max-width:579px){.play-circle{width:28px;height:28px;font-size:0.65rem}}
        .now-dot{display:none;position:absolute;top:5px;left:5px;z-index:3;background:#E50914;color:#fff;font-size:0.5rem;font-weight:800;letter-spacing:1px;padding:2px 6px;border-radius:99px;align-items:center;gap:3px}
        .vcard.playing .now-dot{display:flex}
        .now-dot::before{content:'';width:4px;height:4px;border-radius:50%;background:#fff;animation:blink 1s infinite}
        .vcard-body{padding:8px 10px 10px}
        .vcard-title{font-size:0.78rem;font-weight:700;margin:0 0 3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
        .vcard.playing .vcard-title{color:#E50914}
        .vcard-host{font-size:0.65rem;color:#555}
        .skel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px}
        @media(min-width:580px){.skel-grid{grid-template-columns:repeat(3,1fr)}}
        .skel-card{background:#111;border-radius:10px;overflow:hidden}
        .skel-thumb{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);background-size:200%;animation:shim 1.4s infinite}
        .skel-ln{height:10px;margin:9px 10px 5px;border-radius:3px;background:#181818}
        .skel-ln.s{width:50%;margin-bottom:11px}
        @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
        #float-bar{position:fixed;bottom:60px;left:0;right:0;z-index:2000;background:rgba(14,14,14,0.97);backdrop-filter:blur(10px);border-top:2px solid #E50914;display:none}
        #float-bar.on{display:block;animation:slideUp 0.3s ease}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .fb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer}
        #fb-thumb{width:40px;height:40px;border-radius:5px;object-fit:cover;flex-shrink:0}
        .fb-info{flex:1;overflow:hidden}
        #fb-title{font-size:0.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .fb-sub{font-size:0.62rem;color:#E50914;font-weight:700;letter-spacing:0.5px}
        .fb-up{background:#E50914;border:none;color:#fff;width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;cursor:pointer}
        .fb-x{background:none;border:none;color:#444;font-size:0.85rem;cursor:pointer;padding:4px 6px;flex-shrink:0}
        .fb-prog{height:2px;background:#1a1a1a}
        .fb-prog-fill{height:100%;background:#E50914;width:40%}
        .tabbar-spacer{height:60px}

        /* === TAB SWITCHER VIDEO/AUDIO === */
        .gtab-bar{margin-top:53px;display:flex;background:#0d0d0d;border-bottom:1px solid #1a1a1a;position:relative;z-index:100}
        .gtab-btn{flex:1;padding:13px;background:none;border:none;color:#777;font-weight:800;font-size:0.8rem;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:6px}
        .gtab-btn.active{color:#fff}
        #gtab-video.active{border-bottom-color:#E50914}
        #gtab-audio.active{border-bottom-color:#1DB954}

        /* === AUDIO TAB (diadaptasi dari musik.html, class/id yang bentrok sudah di-namespace) === */
        #panel-audio #player-stage{margin-top:0;min-height:260px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1a1a 0%,#000 100%);transition:background 1.2s ease;padding:28px 20px 18px}
        #panel-audio .idle-msg{text-align:center;opacity:0.3}
        #panel-audio .idle-msg i{font-size:3rem;color:#1DB954;display:block;margin-bottom:10px}
        #panel-audio .idle-msg p{font-size:0.82rem}
        #panel-audio #audio-player{display:none;width:100%;max-width:680px}
        #panel-audio #audio-player.on{display:block}
        #panel-audio .sp-top{display:flex;align-items:flex-end;gap:20px;margin-bottom:18px}
        #panel-audio .sp-cover-box{position:relative;flex-shrink:0}
        #panel-audio #ap-cover{width:120px;height:120px;object-fit:cover;border-radius:8px;display:block;box-shadow:0 16px 40px rgba(0,0,0,0.6)}
        @media(min-width:580px){ #panel-audio #ap-cover{width:160px;height:160px} }
        #panel-audio .eq-wrap{position:absolute;bottom:8px;left:8px;display:none;gap:3px;align-items:flex-end}
        #panel-audio .eq-wrap.go{display:flex}
        #panel-audio .eq-b{width:3px;background:#1DB954;border-radius:2px;animation:eq 0.7s infinite ease-in-out}
        #panel-audio .eq-b:nth-child(1){animation-delay:0s}
        #panel-audio .eq-b:nth-child(2){animation-delay:0.15s}
        #panel-audio .eq-b:nth-child(3){animation-delay:0.3s}
        #panel-audio .eq-b:nth-child(4){animation-delay:0.1s}
        @keyframes eq{0%,100%{height:3px}50%{height:16px}}
        #panel-audio .sp-info{flex:1;overflow:hidden}
        #panel-audio .sp-lbl{font-size:0.6rem;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:6px}
        #panel-audio #ap-title{font-size:clamp(1.3rem,4.5vw,2.4rem);font-weight:900;line-height:1.1;letter-spacing:-0.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        #panel-audio #ap-artist{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-top:6px;font-weight:600}
        #panel-audio .sp-prog-wrap{margin-top:14px}
        #panel-audio .sp-prog-bg{width:100%;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer;position:relative}
        #panel-audio #ap-prog{height:100%;background:#fff;border-radius:2px;width:0%;pointer-events:none}
        #panel-audio .sp-times{display:flex;justify-content:space-between;font-size:0.66rem;color:rgba(255,255,255,0.35);margin-top:5px}
        #panel-audio .sp-ctrls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
        #panel-audio .c-btn{background:none;border:none;color:rgba(255,255,255,0.55);font-size:1.05rem;cursor:pointer;transition:0.18s;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
        #panel-audio .c-btn:hover{color:#fff;transform:scale(1.1)}
        #panel-audio .c-btn.on{color:#1DB954}
        #panel-audio .btn-play{width:54px;height:54px;border-radius:50%;background:#fff;color:#000;border:none;font-size:1.2rem;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,0.4)}
        #panel-audio .btn-play:hover{transform:scale(1.06);background:#e8e8e8}
        #panel-audio .btn-play:active{transform:scale(0.95)}
        #panel-audio audio{display:none}
        #panel-audio .filter-bar-audio{position:sticky;top:53px;z-index:200;display:flex;gap:8px;padding:9px 14px;background:rgba(0,0,0,0.96);backdrop-filter:blur(8px);border-bottom:1px solid #1a1a1a;overflow-x:auto}
        #panel-audio .filter-bar-audio::-webkit-scrollbar{display:none}
        #panel-audio .f-chip-audio{flex-shrink:0;padding:6px 16px;border-radius:20px;background:#181818;border:1px solid #282828;color:#777;font-size:0.76rem;font-weight:700;cursor:pointer;transition:0.18s}
        #panel-audio .f-chip-audio.active{background:#1DB954;color:#000;border-color:#1DB954}
        #panel-audio #track-list{padding:0 6px 150px}
        #panel-audio .track-row{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background 0.15s}
        #panel-audio .track-row:hover{background:rgba(255,255,255,0.06)}
        #panel-audio .track-row.playing{background:rgba(29,185,84,0.08)}
        #panel-audio .tr-num{width:24px;text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.35);flex-shrink:0;font-weight:600}
        #panel-audio .track-row.playing .tr-num{color:#1DB954}
        #panel-audio .tr-num .num-n{display:block}
        #panel-audio .tr-num .num-eq{display:none;align-items:flex-end;gap:2px;height:14px}
        #panel-audio .track-row.playing .tr-num .num-n{display:none}
        #panel-audio .track-row.playing .tr-num .num-eq{display:flex}
        #panel-audio .ne-b{width:2px;background:#1DB954;border-radius:1px;animation:eq 0.7s infinite ease-in-out}
        #panel-audio .ne-b:nth-child(1){animation-delay:0s}
        #panel-audio .ne-b:nth-child(2){animation-delay:0.2s}
        #panel-audio .ne-b:nth-child(3){animation-delay:0.1s}
        #panel-audio .tr-img{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0}
        #panel-audio .tr-info{flex:1;overflow:hidden}
        #panel-audio .tr-title{font-size:0.83rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        #panel-audio .track-row.playing .tr-title{color:#1DB954}
        #panel-audio .tr-host{font-size:0.68rem;color:rgba(255,255,255,0.38);margin-top:2px}
        #panel-audio .tr-share{background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.85rem;cursor:pointer;padding:4px 6px;flex-shrink:0;transition:color 0.15s}
        #panel-audio .tr-share:hover{color:#1DB954}
        #panel-audio .a-skel-list{padding:0 14px}
        #panel-audio .a-skel-row{display:flex;gap:12px;padding:11px 0;align-items:center}
        #panel-audio .a-skel-n{width:22px;height:12px;border-radius:3px;background:#181818;flex-shrink:0}
        #panel-audio .a-skel-sq{width:44px;height:44px;border-radius:6px;flex-shrink:0;background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);background-size:200%;animation:shim 1.4s infinite}
        #panel-audio .a-skel-lines{flex:1}
        #panel-audio .a-skel-ln{height:10px;border-radius:3px;background:#181818;margin-bottom:6px}
        #panel-audio .a-skel-ln.s{width:50%}
        #audio-float-bar{position:fixed;bottom:60px;left:0;right:0;z-index:2000;background:rgba(14,14,14,0.97);backdrop-filter:blur(10px);border-top:2px solid #1DB954;display:none}
        #audio-float-bar.on{display:block;animation:slideUp 0.3s ease}
        #panel-audio #fb-cover{width:40px;height:40px;border-radius:5px;object-fit:cover;flex-shrink:0}
        #audio-fb-title{font-size:0.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        #panel-audio #fb-artist{font-size:0.62rem;color:#1DB954;font-weight:700}
        #panel-audio .fb-btn{background:none;border:none;color:#fff;font-size:1.25rem;cursor:pointer;padding:4px 8px}
        #panel-audio .fb-prog-bg{height:2px;background:#1a1a1a}
        #panel-audio #fb-prog{height:100%;background:#1DB954;width:0%}
        #full-player{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;padding:20px 22px 30px;background:linear-gradient(180deg,#1a1a1a 0%,#000 100%);transition:background 1.2s ease;overflow-y:auto}
        #full-player.open{display:flex}
        .fp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .fp-btn{background:none;border:none;color:rgba(255,255,255,0.65);font-size:1.3rem;cursor:pointer}
        .fp-lbl{font-size:0.62rem;letter-spacing:2px;font-weight:800;color:rgba(255,255,255,0.4)}
        .fp-cover-box{text-align:center;margin-bottom:20px;position:relative;display:inline-block;width:100%}
        #fp-cover{width:min(78vw,260px);height:min(78vw,260px);object-fit:cover;border-radius:10px;box-shadow:0 24px 60px rgba(0,0,0,0.7);display:block;margin:0 auto}
        .fp-eq-box{position:absolute;bottom:10px;left:50%;transform:translateX(-50%) translateX(-min(39vw,130px));display:none;gap:3px;align-items:flex-end}
        .fp-eq-box.go{display:flex}
        .fp-info{text-align:center;margin-bottom:18px}
        #fp-title{font-size:1.5rem;font-weight:900;letter-spacing:-0.3px}
        #fp-artist{font-size:0.88rem;color:rgba(255,255,255,0.5);margin-top:5px}
        .fp-prog-bg{width:100%;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer;margin-bottom:5px}
        #fp-prog{height:100%;background:#fff;border-radius:2px;width:0%;pointer-events:none}
        .fp-times{display:flex;justify-content:space-between;font-size:0.65rem;color:rgba(255,255,255,0.35);margin-bottom:18px}
        .fp-ctrls{display:flex;align-items:center;justify-content:space-around}
        .fp-c{background:none;border:none;color:rgba(255,255,255,0.55);font-size:1.1rem;cursor:pointer;transition:0.18s;width:38px;height:38px;display:flex;align-items:center;justify-content:center}
        .fp-c:hover{color:#fff}
        .fp-c.on{color:#1DB954}
        .fp-play{width:60px;height:60px;border-radius:50%;background:#fff;color:#000;border:none;font-size:1.4rem;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center}
        .fp-play:hover{transform:scale(1.06)}
    </style>
</head>
<body>
<nav class="pcast-nav">
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
    <div class="nav-div"></div>
    <a href="index.html" class="nav-logo">
        <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/refs/heads/main/Logo_Stretart.png" alt="Logo">
        <span>STREETART.ID</span>
    </a>
    <span class="nav-tag"><i class="fa-solid fa-clapperboard"></i> STREET STAGE</span>
</nav>

<div class="gtab-bar">
    <button class="gtab-btn active" id="gtab-video" onclick="switchGalleryTab('video')"><i class="fa-solid fa-clapperboard"></i> Video</button>
    <button class="gtab-btn" id="gtab-audio" onclick="switchGalleryTab('audio')"><i class="fa-solid fa-music"></i> Audio</button>
</div>

<div id="panel-video">
<div id="stage-wrapper">
    <button class="close-btn" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
    <iframe id="yt-frame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="now-bar">
        <img id="np-thumb" src="" alt="">
        <div class="nb-info">
            <div class="nb-title" id="np-title">-</div>
            <div class="nb-host" id="np-host">-</div>
        </div>
        <span class="nb-badge">PLAYING</span>
    </div>
</div>


<div class="filter-bar">
    <button class="f-chip active" onclick="setFilter('all',this)">Semua Video</button>
    <button class="f-chip" onclick="setFilter('new',this)">Terbaru</button>
    <button class="f-chip" onclick="setFilter('old',this)">Terlama</button>
</div>

<div class="sec-hdr">
    <h2><i class="fa-solid fa-clapperboard" style="color:#E50914;margin-right:5px;"></i>Street Stage</h2>
    <span class="cnt" id="vid-count"></span>
</div>

<div id="skel" class="skel-grid">
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-ln"></div><div class="skel-ln s"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-ln"></div><div class="skel-ln s"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-ln"></div><div class="skel-ln s"></div></div>
    <div class="skel-card"><div class="skel-thumb"></div><div class="skel-ln"></div><div class="skel-ln s"></div></div>
</div>
<div class="video-grid" id="video-grid" style="display:none;"></div>

<div id="float-bar">
    <div class="fb-row" onclick="scrollToPlayer()">
        <img id="fb-thumb" src="" alt="">
        <div class="fb-info"><div id="fb-title">-</div><div class="fb-sub">▶ SEDANG DIPUTAR</div></div>
        <button class="fb-up" onclick="scrollToPlayer(event)"><i class="fa-solid fa-chevron-up"></i></button>
        <button class="fb-x" onclick="closePlayer(event)"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="fb-prog"><div class="fb-prog-fill"></div></div>
</div>
</div>
<!-- /panel-video -->

<div id="panel-audio" style="display:none;">
    <div id="player-stage">
        <div class="idle-msg" id="idle-msg">
            <i class="fa-solid fa-headphones"></i>
            <p>Pilih lagu untuk diputar</p>
        </div>
        <div id="audio-player">
            <div class="sp-top">
                <div class="sp-cover-box">
                    <img id="ap-cover" src="" alt="Cover">
                    <div class="eq-wrap" id="sp-eq">
                        <div class="eq-b"></div><div class="eq-b"></div>
                        <div class="eq-b"></div><div class="eq-b"></div>
                    </div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let allVideos = [], currentFilter = 'all', activeId = null;

function getYtId(input) {
    if (!input) return '';
    input = input.trim();
    if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
    const m = input.match(/(?:youtube\.com\/(?:watch\?(?:[^&]*&)*v=|embed\/|shorts\/|live\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : '';
}

async function loadVideos() {
    try {
        const snap = await getDocs(query(collection(db, "podcasts"), orderBy("timestamp", "desc")));
        allVideos = [];
        snap.forEach(doc => {
            const d = doc.data();
            if (d.mediaType === 'video') {
                const raw = d.youtubeId || d.youtube_id || d.videoId || d.link || d.url || '';
                allVideos.push({ id: doc.id, ytId: getYtId(raw), ...d });
            }
        });
        renderGrid();
    } catch(e) {
        console.error("Gagal load:", e);
        document.getElementById('skel').style.display = 'none';
        const g = document.getElementById('video-grid');
        g.style.display = 'grid';
        g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#444;"><i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;display:block;margin-bottom:10px;"></i><p>Gagal memuat konten.</p></div>';
    }
}

function renderGrid() {
    document.getElementById('skel').style.display = 'none';
    const grid = document.getElementById('video-grid');
    grid.style.display = 'grid';
    const items = currentFilter === 'old' ? [...allVideos].reverse() : [...allVideos];
    document.getElementById('vid-count').textContent = items.length + ' video';
    if (!items.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px 20px;color:#444;"><i class="fa-solid fa-video-slash" style="font-size:2.5rem;display:block;margin-bottom:12px;"></i><p>Belum ada video tersedia.</p></div>';
        return;
    }
    grid.innerHTML = '';
    items.forEach(d => {
        const thumb = d.ytId
            ? 'https://img.youtube.com/vi/' + d.ytId + '/hqdefault.jpg'
            : (d.thumb || '');
        const el = document.createElement('div');
        el.className = 'vcard' + (d.id === activeId ? ' playing' : '');
        el.id = 'card-' + d.id;
        el.dataset.ytid  = d.ytId  || '';
        el.dataset.title = d.title || 'Untitled';
        el.dataset.host  = d.host  || 'Admin';
        el.dataset.thumb = thumb;
        el.innerHTML =
            '<div class="vcard-thumb">' +
                '<span class="now-dot">PLAY</span>' +
                '<img src="' + thumb + '" loading="lazy" onerror="this.src=\'https://placehold.co/320x180/111/444?text=No+Thumb\'">' +
                '<div class="play-ol"><div class="play-circle"><i class="fa-solid fa-play"></i></div></div>' +
            '</div>' +
            '<div class="vcard-body">' +
                '<div class="vcard-title">' + (d.title || 'Untitled') + '</div>' +
                '<div class="vcard-host">' + (d.host  || 'Admin')     + '</div>' +
            '</div>';
        el.addEventListener('click', () => playVideo(d.id, el.dataset));
        grid.appendChild(el);
    });
}

function playVideo(id, ds) {
    if (!ds.ytid) {
        alert('Link YouTube tidak ditemukan.\nIsi field link/youtubeId di dashboard admin dengan URL YouTube yang benar.');
        return;
    }
    document.querySelectorAll('.vcard').forEach(c => c.classList.remove('playing'));
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add('playing');
    activeId = id;

    const wrap = document.getElementById('stage-wrapper');
    wrap.classList.add('visible');
    // playsinline penting untuk iOS agar tidak full-screen otomatis
    document.getElementById('yt-frame').src =
        'https://www.youtube.com/embed/' + ds.ytid + '?autoplay=1&rel=0&modestbranding=1&playsinline=1';

    document.getElementById('np-thumb').src   = ds.thumb;
    document.getElementById('np-title').textContent = ds.title;
    document.getElementById('np-host').textContent  = ds.host;
    document.getElementById('fb-thumb').src   = ds.thumb;
    document.getElementById('fb-title').textContent  = ds.title;
    document.getElementById('float-bar').classList.add('on');

    setTimeout(() => wrap.scrollIntoView({ behavior:'smooth', block:'start' }), 80);
}

window.closePlayer = function(e) {
    if (e) e.stopPropagation();
    document.getElementById('stage-wrapper').classList.remove('visible');
    document.getElementById('yt-frame').src = '';
    document.getElementById('float-bar').classList.remove('on');
    document.querySelectorAll('.vcard').forEach(c => c.classList.remove('playing'));
    activeId = null;
};
window.scrollToPlayer = function(e) {
    if (e) e.stopPropagation();
    document.getElementById('stage-wrapper').scrollIntoView({ behavior:'smooth', block:'start' });
};
window.setFilter = function(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.f-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
};

loadVideos();
</script>

<!-- SCRIPT AUDIO (diadaptasi dari musik.html) -->
<script type="module">
import { db as db2 } from './firebase-config.js';
import { collection as collection2, getDocs as getDocs2, query as query2, orderBy as orderBy2 } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const ra = document.getElementById('real-audio');
let allTracks = [];
let filteredTracks = [];
let currentIdx = -1;
let isShuffle = false;
let isRepeat = false;
let currentFilterAudio = 'all';

const fmt = s => {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return `${m}:${sec<10?'0':''}${sec}`;
};

function resolveUrl(url) {
    if (!url) return '';
    if (url.includes('dropbox.com'))
        return url.replace('www.dropbox.com','dl.dropboxusercontent.com').replace('dl=0','raw=1');
    if (url.includes('drive.google.com')) {
        const fid = url.includes('/file/d/')
            ? url.split('/file/d/')[1].split('/')[0]
            : (url.split('id=')[1]?.split('&')[0] || '');
        return fid ? `https://drive.google.com/uc?export=download&id=${fid}` : url;
    }
    return url;
}

window.shareTrack = function(e, idx) {
    e.stopPropagation();
    const d = filteredTracks[idx];
    if (!d) return;
    const title  = d.title  || 'Untitled';
    const artist = d.host   || 'Admin';
    const shareUrl  = window.location.href.split('?')[0] + '?play=' + encodeURIComponent(d.id);
    const shareText = '🎵 ' + title + '\nOleh: ' + artist + '\nDengarkan di STREETART Tunes STREETART.ID';
    if (navigator.share) {
        navigator.share({ title: title + ' – STREETART Tunes', text: shareText, url: shareUrl }).catch(() => {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareUrl).then(() => showToast('✅ Link disalin ke clipboard!')).catch(() => fallbackCopy(shareUrl));
    } else {
        fallbackCopy(shareUrl);
    }
};

function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('✅ Link disalin!'); }
    catch(e) { showToast('Salin manual: ' + text); }
    document.body.removeChild(ta);
}

function showToast(msg) {
    let t = document.getElementById('toast-msg');
    if (!t) {
        t = document.createElement('div');
        t.id = 'toast-msg';
        t.style.cssText = 'position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:#1DB954;color:#000;font-size:0.78rem;font-weight:700;padding:9px 18px;border-radius:99px;z-index:9999;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,0.4);transition:opacity 0.3s;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._tm);
    t._tm = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

async function loadTracks() {
    try {
        const snap = await getDocs2(query2(collection2(db2, "podcasts"), orderBy2("timestamp","desc")));
        allTracks = [];
        snap.forEach(doc => {
            const d = doc.data();
            if (d.mediaType === 'audio') allTracks.push({ id:doc.id, ...d });
        });
        renderList();
    } catch(e) {
        console.error("Error:", e);
        document.getElementById('skel-list').style.display = 'none';
        const tl = document.getElementById('track-list');
        tl.style.display = 'block';
        tl.innerHTML = `<div style="text-align:center;padding:40px;color:#444;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
            <p>Gagal memuat musik.</p></div>`;
    }
}

function renderList() {
    document.getElementById('skel-list').style.display = 'none';
    const tl = document.getElementById('track-list');
    tl.style.display = 'block';
    filteredTracks = currentFilterAudio === 'old' ? [...allTracks].reverse() : [...allTracks];
    document.getElementById('track-count').textContent = filteredTracks.length + ' lagu';

    if (!filteredTracks.length) {
        tl.innerHTML = `<div style="text-align:center;padding:50px 20px;color:#444;">
            <i class="fa-solid fa-music" style="font-size:2.5rem;display:block;margin-bottom:12px;"></i>
            <p>Belum ada musik tersedia.</p></div>`;
        return;
    }

    tl.innerHTML = filteredTracks.map((d,i) => {
        const isPlaying = (currentIdx === i);
        return `
        <div class="track-row ${isPlaying?'playing':''}" id="tr-${d.id}" onclick="playTrack(${i})">
            <div class="tr-num">
                <span class="num-n">${i+1}</span>
                <span class="num-eq">
                    <span class="ne-b"></span><span class="ne-b"></span><span class="ne-b"></span>
                </span>
            </div>
            <img class="tr-img" src="${d.thumb || 'https://placehold.co/44?text=%E2%99%AA'}" loading="lazy"
                 onerror="this.src='https://placehold.co/44?text=%E2%99%AA'">
            <div class="tr-info">
                <div class="tr-title">${d.title || 'Untitled'}</div>
                <div class="tr-host">${d.host || 'Admin'}</div>
            </div>
            <button class="tr-share" onclick="shareTrack(event,${i})" title="Bagikan lagu ini"><i class="fa-solid fa-share-nodes"></i></button>
        </div>`;
    }).join('');
}

window.playTrack = function(idx) {
    const d = filteredTracks[idx];
    if (!d) return;
    currentIdx = idx;
    ra.src = resolveUrl(d.link || d.url || '');
    ra.load();
    ra.play().catch(e => console.error("Play error:", e));
    updateAllUI(d);
    highlightRow(d.id);
    setDynBg(d.thumb || '');
};

function updateAllUI(d) {
    const cover = d.thumb || 'https://placehold.co/140?text=%E2%99%AA';
    const title = d.title || 'Untitled';
    const artist = d.host || 'Admin';
    document.getElementById('idle-msg').style.display = 'none';
    document.getElementById('audio-player').classList.add('on');
    document.getElementById('ap-cover').src = cover;
    document.getElementById('ap-title').textContent = title;
    document.getElementById('ap-artist').textContent = artist;
    document.getElementById('audio-float-bar').classList.add('on');
    document.getElementById('fb-cover').src = cover;
    document.getElementById('audio-fb-title').textContent = title;
    document.getElementById('fb-artist').textContent = artist;
    document.getElementById('fp-cover').src = cover;
    document.getElementById('fp-title').textContent = title;
    document.getElementById('fp-artist').textContent = artist;
}

function highlightRow(id) {
    document.querySelectorAll('#panel-audio .track-row').forEach(el => el.classList.remove('playing'));
    const row = document.getElementById('tr-' + id);
    if (row) { row.classList.add('playing'); row.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function setDynBg(src) {
    if (!src) return;
    const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = src;
    img.onload = () => {
        const c = document.createElement('canvas'); c.width=1; c.height=1;
        const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,1,1);
        const [r,g,b] = ctx.getImageData(0,0,1,1).data;
        const grad = `linear-gradient(180deg,rgb(${r},${g},${b}) 0%,#000 100%)`;
        document.getElementById('player-stage').style.background = grad;
        document.getElementById('full-player').style.background = grad;
    };
}

window.toggleAudio = function(e) {
    if (e) e.stopPropagation();
    if (currentIdx < 0 && filteredTracks.length) { playTrack(0); return; }
    if (ra.paused) ra.play(); else ra.pause();
};
window.nextTrack = function(e) {
    if (e) e.stopPropagation();
    if (!filteredTracks.length) return;
    if (isShuffle) currentIdx = Math.floor(Math.random()*filteredTracks.length);
    else currentIdx = (currentIdx+1) % filteredTracks.length;
    playTrack(currentIdx);
};
window.prevTrack = function(e) {
    if (e) e.stopPropagation();
    if (!filteredTracks.length) return;
    if (ra.currentTime > 3) { ra.currentTime=0; return; }
    currentIdx = (currentIdx-1+filteredTracks.length) % filteredTracks.length;
    playTrack(currentIdx);
};
window.toggleShuffle = function() {
    isShuffle = !isShuffle;
    ['btn-shuf','fp-shuf'].forEach(id => document.getElementById(id)?.classList.toggle('on',isShuffle));
};
window.toggleRepeat = function() {
    isRepeat = !isRepeat;
    ['btn-rep','fp-rep'].forEach(id => document.getElementById(id)?.classList.toggle('on',isRepeat));
};

ra.onplay = () => {
    ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el=document.getElementById(id); if(el) el.className='fa-solid fa-pause'; });
    ['sp-eq','fp-eq'].forEach(id => document.getElementById(id)?.classList.add('go'));
};
ra.onpause = () => {
    ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el=document.getElementById(id); if(el) el.className='fa-solid fa-play'; });
    ['sp-eq','fp-eq'].forEach(id => document.getElementById(id)?.classList.remove('go'));
};
ra.ontimeupdate = () => {
    const pct = (ra.currentTime/ra.duration)*100 || 0;
    const cur = fmt(ra.currentTime);
    const tot = fmt(ra.duration);
    ['ap-prog','fb-prog','fp-prog'].forEach(id => { const el=document.getElementById(id); if(el) el.style.width=pct+'%'; });
    ['t-cur','fp-cur'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=cur; });
    ['t-tot','fp-tot'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=tot; });
};
ra.onended = () => {
    if (isRepeat) { ra.currentTime=0; ra.play(); }
    else window.nextTrack();
};

document.getElementById('sp-prog-bg').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    if (ra.duration) ra.currentTime = ((e.clientX-rect.left)/rect.width)*ra.duration;
});
window.seekFP = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    if (ra.duration) ra.currentTime = ((e.clientX-rect.left)/rect.width)*ra.duration;
};

window.openFullPlayer = function() { document.getElementById('full-player').classList.add('open'); };
window.closeFullPlayer = function() { document.getElementById('full-player').classList.remove('open'); };

window.setFilterAudio = function(f,btn) {
    currentFilterAudio = f;
    document.querySelectorAll('.f-chip-audio').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderList();
};

loadTracks();
</script>

<script>
window.switchGalleryTab = function(tab) {
    const panelVideo = document.getElementById('panel-video');
    const panelAudio = document.getElementById('panel-audio');
    const btnVideo = document.getElementById('gtab-video');
    const btnAudio = document.getElementById('gtab-audio');

    if (tab === 'audio') {
        panelVideo.style.display = 'none';
        panelAudio.style.display = '';
        btnAudio.classList.add('active');
        btnVideo.classList.remove('active');
        // Hentikan video kalau lagi diputar biar gak jalan dobel di belakang layar
        if (typeof window.closePlayer === 'function') window.closePlayer();
    } else {
        panelVideo.style.display = '';
        panelAudio.style.display = 'none';
        btnVideo.classList.add('active');
        btnAudio.classList.remove('active');
        // Jeda audio kalau lagi diputar
        const ra = document.getElementById('real-audio');
        if (ra && !ra.paused) ra.pause();
    }
};
</script>
