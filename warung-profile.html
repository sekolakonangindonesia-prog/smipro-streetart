<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Warung - SMIPRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #E50914; --gold: #FFD700; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { background: var(--dark-bg); color: white; padding-bottom: 100px; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* 1. HEADER BANNER DINAMIS */
        .profile-header {
            height: 220px;
            background-color: #222;
            background-position: center;
            background-size: cover;
            position: relative;
            transition: 0.5s;
        }
        .header-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--dark-bg)); 
        }

        /* 2. IDENTITY (LOGO & TOMBOL) */
        .corner-logo {
            position: absolute; top: 15px; left: 15px; width: 45px; height: 45px; 
            border-radius: 50%; border: 2px solid var(--primary); z-index: 30;
            background: #000; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
        }
        .btn-back-custom {
            position: absolute; top: 70px; left: 15px;
            background: rgba(0,0,0,0.6); border: 1px solid #444; color: white; 
            padding: 6px 15px; border-radius: 20px; cursor: pointer; z-index: 20;
            font-size: 0.8rem; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 5px;
        }

        /* 3. WARUNG INFO STACKED (OVERLAP) */
        .warung-info-box { text-align: center; margin-top: -65px; position: relative; z-index: 10; padding: 0 20px; }
        .warung-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--dark-bg); object-fit: cover; background: #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .warung-name { margin: 10px 0 5px 0; font-weight: 800; font-size: 1.8rem; }
        .warung-rating { color: var(--gold); margin-bottom: 10px; font-size: 0.9rem; }
        .status-badge { background:#333; padding:3px 12px; border-radius:10px; font-size:0.8rem; font-weight: bold; border: 1px solid #444; }

        /* 4. MENU GRID GAYA BARU */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

        .menu-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .menu-card:hover { transform: translateY(-5px); border-color: #555; }
        .menu-img { width: 100%; height: 130px; object-fit: cover; background: #222; }
        .menu-info { padding: 12px; }
        .menu-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .menu-price { color: var(--gold); font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 10px; }

        .btn-order-add {
            width: 100%; padding: 8px; background: #333;
            color: white; border: 1px solid #444; border-radius: 8px;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-order-add:hover { background: var(--primary); border-color: var(--primary); }

        /* 5. CART FLOAT */
        .cart-summary {
            position: fixed; bottom: 85px; left: 20px; right: 20px;
            background: var(--gold); color: black; padding: 12px 25px;
            border-radius: 30px; display: none; 
            justify-content: space-between; align-items: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6); z-index: 1000; font-weight: bold;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 6. BOTTOM NAVIGATION (BOOKING) */
        .bottom-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; border-top: 1px solid #333;
            padding: 15px; display: flex; gap: 10px; z-index: 100; box-sizing: border-box;
        }
        .btn-status { flex: 1; text-align: center; padding: 12px; font-weight: bold; border-radius: 5px; background: #222; color: #888; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
        .btn-book-action { flex: 2; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* REVIEWS */
        .review-section { padding: 20px; margin-top: 20px; border-top: 1px dashed #333; }
        .review-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
        .stars-input i { font-size: 1.5rem; color: #444; cursor: pointer; margin-right: 5px; }
        .stars-input i.active { color: var(--gold); }
    </style>
</head>
<body>

    <!-- BANNER -->
    <div class="profile-header" id="banner-bg">
        <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/main/Logo_Stretart.png" class="corner-logo">
        <button onclick="history.back()" class="btn-back-custom"><i class="fa-solid fa-arrow-left"></i> Kembali</button>
        <div class="header-overlay"></div>
    </div>

    <!-- IDENTITY -->
    <div class="warung-info-box">
        <img src="" id="w-img" class="warung-avatar" onerror="this.src='https://via.placeholder.com/150'">
        <h2 class="warung-name" id="w-name">Memuat...</h2>
        <div id="rating-display" class="warung-rating"></div>
        <span id="w-status" class="status-badge">...</span>
    </div>

    <!-- MENU -->
    <div class="container">
        <h3 style="border-left: 4px solid var(--primary); padding-left: 12px; margin: 40px 20px 15px; color: white;">Daftar Menu</h3>
        <div id="menu-grid" class="menu-grid">
            <p style="grid-column:1/-1; text-align:center; color:#666;">Memuat Menu...</p>
        </div>
    </div>

    <!-- REVIEWS -->
    <div class="review-section">
        <h3 style="margin-bottom: 15px;">Ulasan Pelanggan</h3>
        <div style="background:#1a1a1a; padding:15px; border-radius:10px; border:1px solid #333; margin-bottom:20px;">
            <input type="text" id="review-name" class="input-request" placeholder="Nama Anda" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:5px; margin-bottom:10px; box-sizing:border-box;">
            <textarea id="review-comment" class="input-request" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:5px; margin-bottom:10px; box-sizing:border-box; height:60px;" placeholder="Tulis ulasan..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="stars-input" id="warung-stars-input">
                    <i class="fa-solid fa-star" onclick="rateWarung(1)"></i>
                    <i class="fa-solid fa-star" onclick="rateWarung(2)"></i>
                    <i class="fa-solid fa-star" onclick="rateWarung(3)"></i>
                    <i class="fa-solid fa-star" onclick="rateWarung(4)"></i>
                    <i class="fa-solid fa-star" onclick="rateWarung(5)"></i>
                </div>
                <button onclick="submitWarungReview()" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">Kirim</button>
            </div>
        </div>
        <div id="warung-reviews-list"></div>
    </div>

    <!-- CART FLOAT -->
    <div id="cart-float" class="cart-summary">
        <span><i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span> Item Pesanan</span>
        <span id="cart-total">Rp 0</span>
    </div>

    <!-- BOTTOM ACTION -->
    <div class="bottom-action">
        <div class="btn-status" id="table-status-display">Cek Status...</div>
        <button id="btn-booking-trigger" class="btn-book-action" onclick="openBookingModal()" disabled>Booking Meja</button>
    </div>

    <!-- MODAL BOOKING -->
    <!-- MODAL BOOKING (STANDARD BARU SS2) -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-box">
            <i class="fa-solid fa-xmark close-icon" onclick="closeModal()"></i>
            
             <div style="text-align:center; margin-bottom:10px;">
                <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/main/Logo_Stretart.png" 
                     style="width:60px; height:60px; border-radius:50%; border:2px solid #E50914; padding:2px;">
            </div>
            
            <h3 style="margin:0; text-align:center;">Form Booking</h3>
            <p id="modal-warung-title" style="text-align:center; color:#FFD700; margin-bottom:15px; font-weight:bold;">-</p>
            
            <label style="color:#aaa; font-size:0.8rem;">Nama Pemesan</label>
            <input type="text" id="book-name" class="input-request">
            
            <label style="color:#aaa; font-size:0.8rem;">WhatsApp</label>
            <input type="number" id="book-wa" class="input-request" placeholder="08xxxxxxxx">
            
            <label style="color:#aaa; font-size:0.8rem;">Tanggal Booking</label>
            <input type="date" id="book-date" class="input-request" style="color-scheme: dark;"> 

            <label style="color:#aaa; font-size:0.8rem;">Jumlah Orang</label>
            <input type="number" id="book-pax" class="input-request" placeholder="Total Orang" oninput="hitungMeja()">
            
            <label style="color:#aaa; font-size:0.8rem;">Kebutuhan Meja (1 Meja = 4 Org)</label>
            <input type="text" id="book-qty" class="input-request" readonly style="color:#E50914; font-weight:bold; background:#333;" value="0 Meja">

            <div style="background:#332b00; padding:10px; border-radius:5px; margin-bottom:15px; font-size:0.8rem; color:#ffeb3b; border:1px dashed #ffeb3b;">
                <i class="fa-solid fa-clock"></i> <b>ATURAN WAKTU:</b><br>
                Batas Check-in (Hangus) pukul <b>17:30 WIB</b>.
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn-small" style="background:#444; color:white; flex:1;" onclick="closeModal()">Batal</button>
                <button class="btn-small" style="background:var(--green); color:black; flex:1;" onclick="confirmBooking()">Booking</button>
            </div>
        </div>
    </div>

        <div style="text-align:center; padding:30px 10px; color:#555; font-size:0.8rem; border-top:1px solid #222; margin-top:20px;">
        &copy; 2025 Yayasan Sekolah Konang Indonesia - SMIPRO StreetArt.ID
    </div>


    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, collection, query, where, onSnapshot, getDocs, addDoc, updateDoc, increment, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const warungId = params.get('id');
        
        let currentWarungData = null;
        let myCart = [];

        if(warungId) {
            // 1. DATA WARUNG & BANNER
            onSnapshot(doc(db, "warungs", warungId), (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    currentWarungData = data;
                    
                    document.getElementById('w-name').innerText = data.name;
                    document.getElementById('w-img').src = data.img || '';
                    
                    // UPDATE BANNER DINAMIS
                    const bannerEl = document.getElementById('banner-bg');
                    const defaultBanner = 'https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/refs/heads/main/Bener%20Dasboard3.jpg';
                    bannerEl.style.backgroundImage = `url('${data.bannerImg || defaultBanner}')`;

                    // RATING DISPLAY
                    const ratingBox = document.getElementById('rating-display');
                    const score = (data.rating || 0).toFixed(1);
                    ratingBox.innerHTML = `<i class="fa-solid fa-star"></i> <span>${score} (${data.reviewCount || 0} Ulasan)</span>`;
                    
                    // STATUS MEJA
                    const available = (data.totalTables || 0) - (data.bookedCount || 0);
                    const btnStatus = document.getElementById('table-status-display');
                    const btnBook = document.getElementById('btn-booking-trigger');

                    if (data.status === 'closed') {
                        document.getElementById('w-status').innerText = "TUTUP";
                        btnStatus.innerText = "WARUNG TUTUP";
                        btnBook.disabled = true;
                    } else {
                        document.getElementById('w-status').innerText = "BUKA";
                        btnStatus.innerText = `${available} Meja Tersedia`;
                        btnBook.disabled = available <= 0;
                        btnBook.innerText = available <= 0 ? "PENUH" : "BOOKING MEJA";
                    }
                }
            });

            // 2. DATA MENU (ORDER OPSIONAL)
            const qMenu = query(collection(db, "menus"), where("warungId", "==", warungId));
            onSnapshot(qMenu, (snapshot) => {
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const m = docSnap.data();
                    const showOrder = currentWarungData?.enableOrder ? 'flex' : 'none';
                    grid.innerHTML += `
                    <div class="menu-card">
                        <img src="${m.img || 'https://via.placeholder.com/150'}" class="menu-img">
                        <div class="menu-info">
                            <span class="menu-title">${m.name}</span>
                            <span class="menu-price">Rp ${parseInt(m.price).toLocaleString()}</span>
                            <button class="btn-order-add" style="display:${showOrder}" onclick="addToCart('${docSnap.id}', '${m.name}', ${m.price})">
                                <i class="fa-solid fa-plus"></i> Tambah
                            </button>
                        </div>
                    </div>`;
                });
            });

            // 3. LOAD REVIEWS
            const qReview = query(collection(db, "warung_reviews"), where("warungId", "==", warungId), orderBy("timestamp", "desc"));
            onSnapshot(qReview, (snapshot) => {
                const list = document.getElementById('warung-reviews-list');
                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    list.innerHTML += `
                    <div class="review-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <b>${r.name}</b>
                            <span style="color:var(--gold); font-size:0.8rem;">${"★".repeat(r.rating)}</span>
                        </div>
                        <p style="margin:0; color:#ccc; font-size:0.9rem;">"${r.comment}"</p>
                    </div>`;
                });
            });
        }

        // --- FUNCTIONS ---
        window.addToCart = function(id, name, price) {
            myCart.push({ id, name, price });
            const float = document.getElementById('cart-float');
            const total = myCart.reduce((s, i) => s + i.price, 0);
            float.style.display = 'flex';
            document.getElementById('cart-count').innerText = myCart.length;
            document.getElementById('cart-total').innerText = 'Rp ' + total.toLocaleString();
        }

        let selectedRating = 0;
        window.rateWarung = function(n) {
            selectedRating = n;
            document.querySelectorAll('#warung-stars-input i').forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
        }

        window.submitWarungReview = async function() {
            const name = document.getElementById('review-name').value;
            const comment = document.getElementById('review-comment').value;
            if(!name || selectedRating === 0) return alert("Isi nama dan bintang!");
            await addDoc(collection(db, "warung_reviews"), {
                warungId, name, rating: selectedRating, comment, timestamp: new Date()
            });
            alert("Ulasan dikirim!");
            document.getElementById('review-name').value = '';
            document.getElementById('review-comment').value = '';
        }

        window.openBookingModal = function() {
            document.getElementById('modal-warung-title').innerText = currentWarungData.name;
            document.getElementById('booking-modal').style.display = 'flex';
        }
        window.closeModal = function() { document.getElementById('booking-modal').style.display = 'none'; }
        window.hitungMeja = function() {
            const p = document.getElementById('book-pax').value;
            document.getElementById('book-qty').value = Math.ceil(p/4) + " Meja";
        }
        window.confirmBooking = async function() {
    const name = document.getElementById('book-name').value;
    const wa = document.getElementById('book-wa').value;
    const dateVal = document.getElementById('book-date').value; 
    const pax = parseInt(document.getElementById('book-pax').value) || 0;
    
    // 1. LOGIKA JUMLAH MEJA (Kelipatan 4)
    // 7 orang / 4 = 1.75 -> Dibulatkan ke atas jadi 2 Meja.
    const qtyNeeded = Math.ceil(pax / 4); 

    if(!name || pax < 1) return alert("Mohon lengkapi Nama dan Jumlah Orang!");

    try {
        // --- 2. LOGIKA OTOMATIS CARI NOMOR MEJA KOSONG ---
        
        // A. Ambil semua booking yang saat ini sedang aktif atau sudah dibooking
        const qCek = query(collection(db, "bookings"), 
            where("warungId", "==", warungId),
            where("status", "in", ["booked", "active"])
        );
        const snap = await getDocs(qCek);
        
        let mejaTerpakai = [];
        snap.forEach(d => {
            const data = d.data();
            // Masukkan nomor meja yang sudah terpakai ke dalam daftar "absen"
            if(Array.isArray(data.tableNum)) {
                mejaTerpakai.push(...data.tableNum);
            } else if(data.tableNum) {
                mejaTerpakai.push(data.tableNum);
            }
        });

        // B. Cari meja yang tersedia berdasarkan total meja warung
        let mejaDitemukan = [];
        const limitMeja = currentWarungData.totalTables || 15;

        for(let i = 1; i <= limitMeja; i++) {
            if(!mejaTerpakai.includes(i)) {
                mejaDitemukan.push(i); // Ambil nomor meja ini karena kosong
                if(mejaDitemukan.length === qtyNeeded) break; // Berhenti jika sudah cukup
            }
        }

        // C. Cek apakah meja yang ditemukan cukup untuk pesanan ini?
        if(mejaDitemukan.length < qtyNeeded) {
            return alert(`Maaf, meja penuh! Hanya tersisa ${mejaDitemukan.length} meja kosong, sedangkan Anda butuh ${qtyNeeded} meja.`);
        }

        // --- 3. SIMPAN KE FIREBASE ---
        const kode = 'TIKET-' + Math.floor(1000 + Math.random() * 9000);
        
        await addDoc(collection(db, "bookings"), {
            warungId: warungId,           
            warungName: currentWarungName,
            venueName: currentWarungData.venueName || "Stadion Bayuangga",   
            customerName: name, 
            customerWA: wa,
            pax: pax, 
            tablesNeeded: qtyNeeded, 
            tableNum: mejaDitemukan, // Simpan array nomor meja (Contoh: [1, 2])
            bookingDate: dateVal,
            status: 'booked', 
            bookingCode: kode,
            timestamp: new Date()
        });

        // Update stok booked di data warung
        await updateDoc(doc(db, "warungs", warungId), {
            bookedCount: increment(qtyNeeded)
        });

        alert(`✅ Booking Berhasil!\nUntuk ${pax} Orang, Anda mendapatkan ${qtyNeeded} Meja (Nomor: ${mejaDitemukan.join(", ")}).`);
        closeModal();

    } catch (e) {
        console.error(e);
        alert("Gagal Booking: " + e.message);
    }
}
    </script>
</body>
</html>
