<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Warung - SMIPRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #121212; color: white; padding-bottom: 80px; }
        .profile-header {
            height: 200px;
            background: url('https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/refs/heads/main/Bener%20Dasboard3.jpg') center/cover;
            position: relative;
        }
        .header-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #121212); }
        .warung-info-box { text-align: center; margin-top: -50px; position: relative; z-index: 10; padding: 0 20px; }
        .warung-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--primary); object-fit: cover; background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .menu-grid { 
            display: grid; 
            /* Default HP: 2 Kolom */
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 20px; 
        }

        /* --- TAMBAHAN KHUSUS LAPTOP/TABLET --- */
        @media (min-width: 768px) {
            .menu-grid {
                /* Di Laptop jadi 4 Kolom biar rapi */
                grid-template-columns: repeat(4, 1fr); 
                gap: 20px;
            }
            .menu-card {
                /* Efek bayangan saat mouse diarahkan (opsional) */
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            }
            .menu-img {
                /* Sedikit lebih tinggi di laptop biar jelas */
                height: 150px; 
            }
        }
        .menu-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .menu-img { width: 100%; height: 120px; object-fit: cover; }
        .menu-info { padding: 10px; }
        .menu-title { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .menu-price { color: gold; font-size: 0.9rem; }
        .bottom-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; border-top: 1px solid #333;
            padding: 15px; box-sizing: border-box; display: flex; gap: 10px; z-index: 100;
        }
        .btn-status { flex: 1; text-align: center; padding: 12px; font-weight: bold; border-radius: 5px; background: #333; color: #aaa; cursor: default; }
        .btn-book-action { flex: 2; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-book-action:disabled { background: #555; cursor: not-allowed; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: #1e1e1e; width: 100%; max-width: 350px; padding: 25px; border-radius: 10px; border: 2px solid var(--gold);  box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); position: relative; max-height: 90vh; overflow-y: auto; }
        .input-request { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-small { border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .close-icon { position: absolute; top: 15px; right: 15px; color: #888; cursor: pointer; font-size: 1.2rem; }
        /* --- TAMBAHAN GAYA BARU --- */
        
        /* 1. Logo Pojok Kiri */
        .corner-logo {
            position: absolute; top: 15px; left: 15px; width: 45px; height: 45px; 
            border-radius: 50%; border: 2px solid #E50914; object-fit: cover; z-index: 30;
            background: #000; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 2. Tombol Kembali (Disesuaikan posisinya di bawah logo) */
        .btn-back-custom {
            position: absolute; top: 70px; left: 15px; /* Turun ke bawah logo */
            background: rgba(0,0,0,0.6); border: 1px solid #555; color: white; 
            padding: 5px 12px; border-radius: 20px; cursor: pointer; z-index: 20;
            font-size: 0.8rem; display: flex; align-items: center; gap: 5px;
            backdrop-filter: blur(5px);
        }

        /* 3. Rating Bintang */
        .warung-rating { margin-bottom: 10px; color: gold; font-size: 0.9rem; }
        .warung-rating span { color: #aaa; font-size: 0.8rem; margin-left: 5px; }
        
        /* GAYA UNTUK ULASAN WARUNG */
        .review-section { margin-top: 30px; border-top: 1px dashed #333; padding-top: 20px; }
        .stars-input i { font-size: 1.5rem; color: #444; cursor: pointer; transition: 0.2s; margin-right: 5px; }
        .stars-input i.active { color: gold; }
        .review-card { background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .review-stars { color: gold; font-size: 0.8rem; }

        /* --- TAMPILAN TOMBOL TAMBAH DI MENU --- */
        .btn-order-add {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-order-add:hover {
            background: var(--primary); /* Berubah jadi merah saat disentuh */
            border-color: var(--primary);
        }

        .btn-order-add i {
        font-size: 0.7rem;
        }

        /* --- GAYA BARU KERANJANG DI POJOK KANAN ATAS --- */
 .cart-summary {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 55px; /* Sedikit diperbesar agar ikon lebih leluasa */
    height: 55px;
    background: #FFD700 !important; /* Kuning Emas Solid */
    border-radius: 50%;
    display: none; /* Baru muncul lewat JS */
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.7);
    z-index: 99999; /* Pastikan di barisan terdepan */
    cursor: pointer;
    border: 2px solid #000;
}

.cart-summary i {
    color: #000000 !important; 
    font-size: 1.4rem !important;
    margin: 0;
    padding: 0;
}


/* Lingkaran Angka Merah (Badge) */
.cart-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: #E50914 !important; /* Merah */
    color: white !important;
    font-size: 0.7rem;
    font-weight: bold;
    min-width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #000;
}

/* --- HEADER LOGO DI DALAM MODAL (DITUKAR) --- */
.modal-header-logos {
    display: flex;
    align-items: center;
    justify-content: center; /* Warung Profil di tengah */
    position: relative;
    margin-bottom: 25px;
    height: 50px;
}

.modal-platform-logo {
    position: absolute;
    left: 0; /* Logo StreetArt di pojok kiri modal */
    width: 30px; /* Ukuran diperkecil */
}

.modal-warung-mini {
    width: 50px; /* Ukuran diperkecil sedikit */
    height: 50px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    object-fit: cover;
    background: #000;
}
        
    </style>
</head>
<body>

    <!-- HEADER GAMBAR -->
    <div class="profile-header">
        
        <!-- 1. LOGO KECIL (BARU) -->
        <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/main/Logo_Stretart.png" class="corner-logo">

        <!-- 2. TOMBOL KEMBALI (POSISI DIPERBAIKI) -->
        <button onclick="history.back()" class="btn-back-custom">

        <span id="w-status" style="background:#333; padding:3px 10px; border-radius:10px; font-size:0.8rem;">...</span>

    <div class="container">
        <!-- ... (Kode selebihnya biarkan sama) ... -->

    <div class="container">
        <h3 style="border-bottom:1px solid #333; padding-bottom:10px; margin-top:30px; color:var(--accent);">Daftar Menu</h3>
        <div id="menu-grid" class="menu-grid">

        <!-- FORMULIR ULASAN -->
        <div class="review-section">
            <h3 style="color:var(--accent);">Ulasan Pelanggan</h3>
            
            <div style="background:#1a1a1a; padding:15px; border-radius:10px; border:1px solid #333; margin-bottom:20px;">
                <input type="text" id="review-name" class="input-request" placeholder="Nama Anda">
                <textarea id="review-comment" class="input-request" style="height:60px;" placeholder="Tulis pengalaman makan disini..."></textarea>
                
                <div style="display:flex; justify-content:space-between; align-items:center;">

       <div id="cart-float" class="cart-summary" onclick="openOrderModal()">
            <i class="fa-solid fa-cart-shopping" style="font-size: 1.3rem;"></i>
            <!-- Angka Badge -->
            <div id="cart-badge" class="cart-badge">0</div>
        </div>
        
    <div class="bottom-action">
        <div class="btn-status" id="table-status-display">Cek Status...</div>
        <button id="btn-booking-trigger" class="btn-book-action" onclick="openBookingModal()" disabled>Loading...</button>
    </div>

    <!-- MODAL BOOKING (STANDARD BARU SS2) -->
    <div id="booking-modal" class="modal-overlay">

             <div style="text-align:center; margin-bottom:10px;">
                <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/main/Logo_Stretart.png" 
                     style="width:60px; height:60px; border-radius:50%; border:2px solid #E50914; padding:2px;">
            </div>
            
            <h3 style="margin:0; text-align:center;">Form Booking</h3>
            <p id="modal-warung-title" style="text-align:center; color:#FFD700; margin-bottom:15px; font-weight:bold;">-</p>
            
            <label style="color:#aaa; font-size:0.8rem;">Nama Pemesan</label>

            <label style="color:#aaa; font-size:0.8rem;">WhatsApp</label>

            <div style="background:#332b00; padding:10px; border-radius:5px; margin-bottom:15px; font-size:0.8rem; color:#ffeb3b; border:1px dashed #ffeb3b;">

        <!-- MODAL DETAIL PESANAN PELANGGAN (TARUH DI BARIS 243) -->
   <div id="order-modal" class="modal-overlay">
    <div class="modal-box" style="border:1px solid var(--gold); padding: 25px;">
        <i class="fa-solid fa-xmark close-icon" onclick="closeOrderModal()"></i>
        
        <!-- HEADER DUA LOGO -->
        <div class="modal-header-logos">

             <img src="https://raw.githubusercontent.com/sekolakonangindonesia-prog/smipro-streetart/main/Logo_Stretart.png" class="modal-platform-logo">
            
            <!-- Logo StreetArt di Tengah -->
             <img src="" id="modal-warung-img" class="modal-warung-mini" onerror="this.src='https://placehold.co/100'">

        <h3 style="text-align:center; color:white; margin-bottom:20px; font-size:1.1rem;">Daftar Pesanan Belanja</h3>

</div>

        <div style="text-align:center; padding:30px 10px; color:#555; font-size:0.8rem; border-top:1px solid #222; margin-top:20px;">
        &copy; 2025 Yayasan Sekolah Konang Indonesia - SMIPRO StreetArt.ID
    </div>

    <!-- SCRIPT UPDATE: PERBAIKAN IMPORT & LOGIKA RATING -->
    <script type="module">
        import { db } from './firebase-config.js';
        import { 
            doc, getDoc, collection, query, where, onSnapshot, getDocs, addDoc, updateDoc, increment, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const warungId = params.get('id');
        
        let currentWarungName = "";
        let venueNameGlobal = ""; 
        let totalTables = 0;
        // Variabel untuk menyimpan rating saat ini agar hitungannya akurat
        let currentRatingScore = 0; 
        let currentReviewCount = 0;
        let currentWarungData = {};

        if(warungId) {
            // 1. DATA WARUNG (REALTIME)
            onSnapshot(doc(db, "warungs", warungId), async (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    currentWarungData = data;
                    currentWarungName = data.name;
                    venueNameGlobal = data.venueName || "Stadion Bayuangga"; 
                    totalTables = data.totalTables;
                    
                    // Simpan data rating lama untuk perhitungan update nanti
                    currentRatingScore = data.rating || 0; // Misal 4.5
                    currentReviewCount = data.reviewCount || 0; // Misal 10 ulasan

                    document.getElementById('w-name').innerText = data.name;
                    if(data.img) document.getElementById('w-img').src = data.img;

                    // TAMPILKAN RATING DARI DATABASE PUSAT (Agar sinkron dengan SS2)
                    const ratingBox = document.querySelector('.warung-rating');
                    if(ratingBox) {
                        const scoreTampil = currentRatingScore.toFixed(1); // 4.8
                        ratingBox.innerHTML = `
                            <i class="fa-solid fa-star"></i> 
                            <span style="font-size:1.2rem; font-weight:bold; color:white;">${scoreTampil}</span> 
                            <span style="font-size:0.8rem;">(${currentReviewCount} Ulasan)</span>
                        `;
                    }
                    
                    // LOGIKA STATUS MEJA                    
                    const todayStr = new Date().toLocaleDateString('en-CA'); 

                    // 1. Ambil data booking yang AKTIF atau RESERVASI di database
                    const qKetersediaan = query(collection(db, "bookings"), 
                        where("warungId", "==", warungId),
                        where("status", "in", ["booked", "active"])
                    );

                    const snapKetersediaan = await getDocs(qKetersediaan);
                    let mejaTerpakaiHariIni = 0;

                    // 2. Filter: Hanya hitung yang tanggalnya HARI INI saja
                    snapKetersediaan.forEach(bookedDoc => {
                        const b = bookedDoc.data();
                        if (b.bookingDate === todayStr || b.status === 'active') {
                            mejaTerpakaiHariIni += (parseInt(b.tablesNeeded) || 1);
                        }
                    });

        // 3. Update sisa meja yang jujur ditampilkan ke pelanggan hari ini
        const available = (parseInt(data.totalTables) || 15) - mejaTerpakaiHariIni;
        const isFull = available <= 0;
        // --------------------------------------------
                    
                    const btnStatus = document.getElementById('table-status-display');
                    const btnBook = document.getElementById('btn-booking-trigger');

                    if (data.status === 'closed') {
                        document.getElementById('w-status').innerText = "SEDANG TUTUP";
                        document.getElementById('w-status').style.color = "red";
                        btnStatus.innerText = "WARUNG TUTUP";
                        btnBook.innerText = "TIDAK MENERIMA PESANAN";
                        btnBook.disabled = true;
                        btnBook.style.background = "#555";
                    } else if (isFull) {
                        document.getElementById('w-status').innerText = "BUKA - PENUH";
                        document.getElementById('w-status').style.color = "orange";
                        btnStatus.innerText = "0 Meja";
                        btnBook.innerText = "FULL BOOKED";
                        btnBook.disabled = true;
                        btnBook.style.background = "#555";
                    } else {
                        document.getElementById('w-status').innerText = "BUKA";
                        document.getElementById('w-status').style.color = "#00ff00";
                        btnStatus.innerText = `${available} Meja Tersedia`;
                        btnBook.innerText = "BOOKING SEKARANG";
                        btnBook.disabled = false;
                        btnBook.style.background = "#E50914";
                    }
                }
            });

            // 2. DATA MENU
            const qMenu = query(collection(db, "menus"), where("warungId", "==", warungId));
            onSnapshot(qMenu, (snapshot) => {
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                if(snapshot.empty) {
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Belum ada menu.</p>';
                    return;
                }
                snapshot.forEach(docSnap => {
                    const m = docSnap.data();

                    const showOrder = (typeof currentWarungData !== 'undefined' && currentWarungData?.enableOrder) ? 'flex' : 'none'; // BARU
                    
                    grid.innerHTML += `
                    <div class="menu-card">
                        <img src="${m.img || 'https://via.placeholder.com/150'}" class="menu-img">
                        <div class="menu-info">
                            <span class="menu-title">${m.name}</span>
                            <span class="menu-price">Rp ${parseInt(m.price).toLocaleString()}</span>
                            <button class="btn-order-add" style="display:${showOrder}" onclick="addToCart('${docSnap.id}', '${m.name}', ${m.price})">
                            <i class="fa-solid fa-plus"></i> Tambah
                        </button>
                        </div>
                    </div>`;
                });
            });
            
           // 3. LOAD REVIEW LIST 
            // (Kita hapus orderBy sementara agar data mau muncul dulu)
            const qReview = query(collection(db, "warung_reviews"), 
                where("warungId", "==", warungId)
                // orderBy("timestamp", "desc") <--- SAYA MATIKAN DULU INI
            );

            onSnapshot(qReview, (snapshot) => {
                const list = document.getElementById('warung-reviews-list');
                list.innerHTML = ''; 
                
                if(snapshot.empty) {
                    list.innerHTML = '<p style="text-align:center; color:#555;">Belum ada ulasan. Jadilah yang pertama!</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const r = doc.data();
                    let starsHtml = "★".repeat(r.rating) + "☆".repeat(5 - r.rating);
                    list.innerHTML += `
                    <div class="review-card">
                        <div class="review-header">
                            <b style="color:white;">${r.name}</b>
                            <span class="review-stars">${starsHtml}</span>
                        </div>
                        <p style="margin:0; color:#ccc; font-size:0.9rem;">"${r.comment}"</p>
                    </div>`;
                });
            }, (error) => {
                // Tambahan: Jika masih error, pesan akan muncul
                console.error("Error ambil data:", error);
                alert("Gagal ambil ulasan: " + error.message);
            });

        } else {
            alert("Warung tidak ditemukan!");
            window.location.href = 'index.html';
        }

        // --- FUNGSI GLOBAL (WINDOW) ---

        // 1. LOGIK BINTANG DIKLIK
        let selectedRating = 0;
        window.rateWarung = function(n) {
            selectedRating = n;
            document.querySelectorAll('#warung-stars-input i').forEach((s, i) => {
                // i dimulai dari 0, jadi jika n=3 (bintang ke-3), kita highlight index 0,1,2
                if (i < n) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        // 2. KIRIM REVIEW (DAN UPDATE RATING PUSAT)
        window.submitWarungReview = async function() {
            const name = document.getElementById('review-name').value;
            const comment = document.getElementById('review-comment').value;

            if(!name || selectedRating === 0) return alert("Mohon isi Nama dan pilih Bintang!");

            try {
                // A. Simpan Ulasan ke tabel 'warung_reviews'
                await addDoc(collection(db, "warung_reviews"), {
                    warungId: warungId,
                    warungName: currentWarungName,
                    name: name,
                    rating: selectedRating,
                    comment: comment,
                    timestamp: new Date()
                });

                // B. HITUNG RATA-RATA BARU UNTUK UPDATE DATA INDUK
                // Rumus: ((Rata2 Lama * Jml Lama) + Nilai Baru) / (Jml Lama + 1)
                const oldTotalScore = currentRatingScore * currentReviewCount;
                const newTotalScore = oldTotalScore + selectedRating;
                const newCount = currentReviewCount + 1;
                const newAverage = newTotalScore / newCount;

                // C. Update Data Warung Utama (Supaya Halaman Depan/SS2 ikut berubah)
                await updateDoc(doc(db, "warungs", warungId), {
                    rating: newAverage,
                    reviewCount: newCount // Kita update jumlah ulasannya juga
                });

                alert("Terima kasih! Ulasan Anda berhasil dikirim.");
                
                // Reset Form
                document.getElementById('review-name').value = '';
                document.getElementById('review-comment').value = '';
                window.rateWarung(0); 

            } catch (e) {
                console.error(e);
                alert("Gagal kirim ulasan: " + e.message);
            }
        }

        // 3. BOOKING MODAL & LOGIC
        window.openBookingModal = function() {
            document.getElementById('modal-warung-title').innerText = currentWarungName;
            document.getElementById('book-name').value = '';
            document.getElementById('book-wa').value = '';
            document.getElementById('book-date').value = '';
            document.getElementById('book-pax').value = '';
            document.getElementById('book-qty').value = '0 Meja';
            document.getElementById('booking-modal').style.display = 'flex';
        }

        window.hitungMeja = function() {
            let orang = parseInt(document.getElementById('book-pax').value) || 0;
            let qty = orang < 1 ? 0 : Math.ceil(orang / 4);
            document.getElementById('book-qty').value = qty + " Meja";
        }

        window.closeModal = function() { document.getElementById('booking-modal').style.display = 'none'; }

        // --- LOGIKA BOOKING UPDATE (SINKRON DENGAN DASHBOARD ADMIN) ---
        window.confirmBooking = async function() {
            const name = document.getElementById('book-name').value;
            let wa = document.getElementById('book-wa').value;
            const dateVal = document.getElementById('book-date').value; 
            const pax = parseInt(document.getElementById('book-pax').value) || 0;
            const qty = Math.ceil(pax / 4); 

            if(!name || !wa || !dateVal || pax < 1) return alert("Mohon lengkapi data!");
            if (wa.startsWith('0')) wa = '62' + wa.slice(1);

            // UI Loading (Biar user gak klik 2 kali)
            const btnConfirm = document.querySelector('#booking-modal button[onclick="confirmBooking()"]');
            btnConfirm.innerText = "Memproses...";
            btnConfirm.disabled = true;
            btnConfirm.style.background = "#555";

            try {
                // 1. CEK KETERSEDIAAN (DOUBLE CHECK KE DATABASE)
                // Mengambil data booking terbaru detik ini juga
                const q = query(collection(db, "bookings"), 
                    where("warungId", "==", warungId), 
                    where("status", "in", ["active", "booked"]),
                    where("bookingDate", "==", dateVal) // <--- KUNCI: Hanya cek meja terpakai di tanggal ini
                );
                
                const snapshot = await getDocs(q);

                let usedTables = [];
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if (Array.isArray(d.tableNum)) usedTables.push(...d.tableNum);
                    else usedTables.push(d.tableNum);
                });

                // 2. CARI MEJA KOSONG (Looping sesuai jumlah meja WARUNG TERSEBUT)
                let assignedTables = [];
                // 'totalTables' diambil dari data warung di script bagian atas (onSnapshot)
                for (let i = 1; i <= (totalTables || 15); i++) {
                    if (!usedTables.includes(i)) {
                        assignedTables.push(i);
                        if (assignedTables.length === qty) break; 
                    }
                }

                // Jika meja kurang
                if (assignedTables.length < qty) {
                    throw new Error(`Maaf, meja penuh! Hanya tersisa ${assignedTables.length} meja kosong.`);
                }

                // 3. SIMPAN KE DATABASE (Format disamakan dengan SS2)
                const now = new Date();
                const jamBooking = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                const kode = 'TIKET-' + Math.floor(1000 + Math.random() * 9000);

                await addDoc(collection(db, "bookings"), {
                    warungId: warungId,           
                    warungName: currentWarungName,
                    venueName: venueNameGlobal || "Stadion Bayuangga",   
                    customerName: name, 
                    customerWA: wa,
                    pax: pax, 
                    tablesNeeded: qty,
                    tableNum: assignedTables, // Array nomor meja (PENTING UNTUK DASHBOARD)
                    bookingDate: dateVal,
                    arrivalTime: jamBooking, 
                    expiredTime: `${dateVal}T17:30`,
                    bookingCode: kode, 
                    status: 'booked', 
                    revenue: 0,
                    timestamp: new Date()
                });

                // Update Stok Warung (Increment sesuai jumlah meja yg dipesan)
                await updateDoc(doc(db, "warungs", warungId), {
                    bookedCount: increment(qty)
                });

                window.closeModal();

                // 4. FORMAT WA (SAMA PERSIS DENGAN SS2)
                const mejaString = assignedTables.join(", ");
                const pesan = `Halo ${name},\n\n` +
                              `Terima kasih sudah memesan tempat di *${currentWarungName}* pada jam ${jamBooking}\n` +
                              `Berikut detail pesanan Anda:\n` +
                              `Tanggal: ${dateVal}\n` +
                              `Jumlah: ${pax} Orang\n` +
                              `Kode Tiket: *${kode}*\n` +
                              `MEJA RESERVASI: No. ${mejaString}\n` +
                              `Scan QR yang ada di meja no tersebut untuk check-in\n\n` +
                              `PENTING: Harap Check-In sebelum Pukul *17:30 WIB*.\n` +
                              `Lewat dari jam tersebut, harap hubungi *${currentWarungName}*`;

                if(confirm(`Booking Berhasil! Meja No: ${mejaString}\n\nKirim tiket ke WA?`)) {
                    window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`, '_blank');
                }

            } catch (e) {
                console.error(e);
                alert("Gagal Booking: " + e.message);
            } finally {
                // Kembalikan tombol jadi normal
                btnConfirm.innerText = "Booking";
                btnConfirm.disabled = false;
                btnConfirm.style.background = "var(--green)";
            }
        }

/* =========================================
   LOGIKA KERANJANG BELANJA (ORDER ONLINE)
   ========================================= */

let myCart = JSON.parse(localStorage.getItem(`cart_${warungId}`)) || [];

// 1. Fungsi Tambah ke Keranjang
window.addToCart = function(id, name, price) {
    const item = { id, name, price };
    myCart.push(item);
    simpanKeMemori();

    function simpanKeMemori() {
    localStorage.setItem(`cart_${warungId}`, JSON.stringify(myCart));
}
    
    // Tampilkan notifikasi kecil (opsional)
    console.log("Ditambahkan:", name);
      
    // Update tampilan Bar Kuning
    updateCartUI();
}

// 2. Fungsi Update Tampilan Bar Keranjang Kuning
function updateCartUI() {
    const cartFloat = document.getElementById('cart-float');
    const badgeEl = document.getElementById('cart-badge');
        
    if (myCart.length > 0) {
        cartFloat.style.display = 'flex';
        badgeEl.innerText = myCart.length; // Hanya update angka 1, 2, 3..        
    } else {
        cartFloat.style.display = 'none';
    }
}
        
// 3. Fungsi Melihat Detail & Mengirim Pesanan
        
// A. Fungsi Buka Modal Keranjang
   window.openOrderModal = function() {
    // A. Ambil identitas warung untuk dipasang di modal
    const profilWarung = document.getElementById('w-img').src;
    document.getElementById('modal-warung-img').src = profilWarung;

    // B. Ambil elemen modal
    const modal = document.getElementById('order-modal');
    const list = document.getElementById('order-items-list');
    const totalEl = document.getElementById('total-modal-price');

    if(myCart.length === 0) return alert("Keranjang Kosong!");

    // C. Reset isi list sebelum digambar ulang
    list.innerHTML = '';
    let total = 0;

    // D. Gambar daftar belanjaan
    myCart.forEach((item, index) => {
        total += item.price;
        list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#252525; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #333;">
                <div>
                    <b style="display:block; font-size:0.9rem;">${item.name}</b>
                    <small style="color:var(--gold);">Rp ${item.price.toLocaleString()}</small>
                </div>
                <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#E50914; cursor:pointer; font-size:1.1rem;">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>`;
    });

    totalEl.innerText = 'Rp ' + total.toLocaleString();
    modal.style.display = 'flex';
}; // <--- INI ADALAH PENUTUP DI BARIS 757 (HANYA SATU SAJA)
        
// B. Fungsi Hapus Item dari Keranjang
window.removeFromCart = function(index) {
    myCart.splice(index, 1); // Hapus 1 data
    simpanKeMemori();
    updateCartUI(); // Update bar kuning di halaman utama

    if(myCart.length > 0) {
        renderOrderItemsInsideModal(); // Gambar ulang isi modal (fungsi bantu)
    } else {
        closeOrderModal(); // Tutup kalau sudah habis
    }
}

        window.confirmOrder = async function() {
    if(myCart.length === 0) return alert("Pilih menu dulu!");

    // Kita ambil data dari form booking yang sudah ada supaya tidak isi dua kali
    const namaPemesan = document.getElementById('book-name').value;
    const nomorMeja = document.getElementById('book-qty').value; // Misal: "2 Meja" atau ambil dari nomor meja check-in

    if(!namaPemesan) return alert("Mohon isi Nama di form booking dulu sebagai identitas.");

    if(confirm("Kirim pesanan ini ke dapur?")) {
        try {
            await addDoc(collection(db, "warung_orders"), {
                warungId: warungId,
                customerName: namaPemesan,
                tableNum: nomorMeja,
                items: myCart,
                status: "pending",
                timestamp: new Date()
            });

             alert("Pesanan terkirim! Silakan tunggu hidangan Anda.");
                       
            myCart = [];      
            localStorage.removeItem(`cart_${warungId}`);
            updateCartUI();
            closeOrderModal();
        } catch (e) {
            alert("Gagal kirim pesanan: " + e.message);
        }
    }
}
        
                
// Fungsi bantu pelengkap untuk gambar ulang isi modal tanpa menutupnya
function renderOrderItemsInsideModal() {
    const list = document.getElementById('order-items-list');
    const totalEl = document.getElementById('total-modal-price');
    list.innerHTML = '';
    let total = 0;
    myCart.forEach((item, index) => {
        total += item.price;
        list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#252525; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #333;">
                <div><b>${item.name}</b><br><small style="color:var(--gold);">Rp ${item.price.toLocaleString()}</small></div>
                <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#E50914;"><i class="fa-solid fa-trash-can"></i></button>
            </div>`;
    });
    totalEl.innerText = 'Rp ' + total.toLocaleString();
}

window.closeOrderModal = function() {
    document.getElementById('order-modal').style.display = 'none';
}
        updateCartUI();
        
    </script>
