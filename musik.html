<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>SMIPRO Tunes – STREETART.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* ── NAVBAR ── */
        .mu-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 3000;
            display: flex; align-items: center; padding: 10px 16px; gap: 12px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid #1a1a1a;
        }
        .mu-nav a { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .mu-nav .logo { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .mu-nav .logo img { height: 26px; }
        .mu-nav .logo span { font-size: 0.78rem; font-weight: 800; letter-spacing: 1px; color: #1DB954; }

        /* ── PLAYER STAGE (DYNAMIC BG) ── */
        #player-stage {
            margin-top: 53px;
            min-height: 280px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            transition: background 1.2s ease;
            padding: 30px 20px 20px;
        }

        /* IDLE STATE */
        .idle-state {
            text-align: center; opacity: 0.3;
        }
        .idle-state i { font-size: 3.5rem; margin-bottom: 12px; display: block; color: #1DB954; }
        .idle-state p { font-size: 0.85rem; }

        /* ── AUDIO PLAYER (Spotify Layout) ── */
        #audio-player { display: none; width: 100%; max-width: 700px; }
        #audio-player.active { display: block; }

        /* COVER + INFO */
        .sp-top {
            display: flex; align-items: flex-end; gap: 24px;
            margin-bottom: 20px;
        }
        .sp-cover-wrap {
            flex-shrink: 0; position: relative;
        }
        #ap-cover {
            width: 140px; height: 140px; object-fit: cover;
            border-radius: 8px; display: block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        /* Equalizer on cover when playing */
        .eq-overlay {
            position: absolute; bottom: 8px; left: 8px;
            display: none; gap: 3px; align-items: flex-end;
        }
        .eq-overlay.playing { display: flex; }
        .eq-bar { width: 3px; background: #1DB954; border-radius: 2px; animation: eq 0.7s infinite ease-in-out; }
        .eq-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { height: 6px; animation-delay: 0.3s; }
        .eq-bar:nth-child(4) { height: 12px; animation-delay: 0.1s; }
        @keyframes eq { 0%,100%{height:3px} 50%{height:18px} }

        .sp-info { flex: 1; overflow: hidden; }
        .sp-type-label {
            font-size: 0.65rem; font-weight: 800; letter-spacing: 2px;
            color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 6px;
        }
        #ap-title {
            font-size: clamp(1.4rem, 5vw, 2.8rem);
            font-weight: 900; line-height: 1.1;
            letter-spacing: -1px; color: #fff;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #ap-artist {
            font-size: 0.9rem; color: rgba(255,255,255,0.7);
            margin-top: 8px; font-weight: 600;
        }

        /* PROGRESS */
        .sp-progress-wrap { margin-top: 16px; }
        .sp-progress-bg {
            width: 100%; height: 4px; background: rgba(255,255,255,0.15);
            border-radius: 2px; cursor: pointer; position: relative;
        }
        #ap-progress-bar {
            height: 100%; background: #fff; border-radius: 2px;
            width: 0%; pointer-events: none; transition: width 0.1s linear;
        }
        .sp-times {
            display: flex; justify-content: space-between;
            font-size: 0.68rem; color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }

        /* CONTROLS */
        .sp-controls {
            display: flex; align-items: center; justify-content: center;
            gap: 18px; margin-top: 18px;
        }
        .ctrl-btn {
            background: none; border: none; color: rgba(255,255,255,0.6);
            font-size: 1.1rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
        }
        .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
        .ctrl-btn.active { color: #1DB954; }

        .btn-play-main {
            width: 58px; height: 58px; border-radius: 50%;
            background: #fff; color: #000; border: none;
            font-size: 1.3rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .btn-play-main:hover { transform: scale(1.06); background: #e0e0e0; }
        .btn-play-main:active { transform: scale(0.96); }

        /* AUDIO TAG */
        audio { display: none; }

        /* ── FILTER ── */
        .filter-bar {
            position: sticky; top: 53px; z-index: 200;
            display: flex; gap: 8px; padding: 10px 16px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            border-bottom: 1px solid #1a1a1a; overflow-x: auto;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0; padding: 7px 18px; border-radius: 20px;
            background: #1a1a1a; border: 1px solid #2a2a2a;
            color: #888; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .filter-chip.active { background: #1DB954; color: #000; border-color: #1DB954; }

        /* ── SECTION HEADER ── */
        .sec-header {
            padding: 20px 16px 10px;
            display: flex; align-items: baseline; gap: 10px;
        }
        .sec-header h2 { font-size: 1.05rem; font-weight: 800; }
        .sec-header .count { font-size: 0.7rem; color: #555; }

        /* ── TRACK LIST ── */
        #track-list { padding: 0 8px 140px; }

        .track-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 8px; border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
        }
        .track-item:hover { background: rgba(255,255,255,0.06); }
        .track-item.playing { background: rgba(29,185,84,0.08); }

        .track-num {
            width: 26px; text-align: center; font-size: 0.8rem;
            color: rgba(255,255,255,0.4); flex-shrink: 0; font-weight: 600;
        }
        .track-item.playing .track-num { color: #1DB954; }
        /* mini eq when playing */
        .track-item.playing .track-num-num { display: none; }
        .track-item.playing .track-num-eq { display: flex !important; }
        .track-num-eq { display: none; gap: 2px; align-items: flex-end; height: 16px; }
        .tne-bar { width: 2px; background: #1DB954; border-radius: 1px; animation: eq 0.7s infinite ease-in-out; }
        .tne-bar:nth-child(1){ animation-delay:0s; }
        .tne-bar:nth-child(2){ animation-delay:0.2s; }
        .tne-bar:nth-child(3){ animation-delay:0.1s; }

        .track-thumb {
            width: 46px; height: 46px; border-radius: 6px;
            object-fit: cover; flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .track-info { flex: 1; overflow: hidden; }
        .track-title {
            font-size: 0.85rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-item.playing .track-title { color: #1DB954; }
        .track-host { font-size: 0.7rem; color: rgba(255,255,255,0.45); margin-top: 3px; }

        .track-more {
            background: none; border: none; color: rgba(255,255,255,0.3);
            font-size: 0.9rem; cursor: pointer; padding: 4px;
            transition: 0.2s; flex-shrink: 0;
        }
        .track-more:hover { color: #fff; }

        /* ── SKELETON ── */
        .skel-list { padding: 0 16px; }
        .skel-row { display: flex; gap: 12px; padding: 12px 0; align-items: center; }
        .skel-n { width: 24px; height: 14px; border-radius: 3px; background: #1a1a1a; flex-shrink: 0; }
        .skel-sq { width: 46px; height: 46px; border-radius: 6px; background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200%; animation: shimmer 1.4s infinite; flex-shrink: 0; }
        .skel-lines { flex: 1; }
        .skel-ln { height: 11px; border-radius: 3px; background: #1a1a1a; margin-bottom: 7px; }
        .skel-ln.short { width: 50%; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── FULL PLAYER OVERLAY (Mobile) ── */
        #full-player {
            position: fixed; inset: 0; z-index: 9000;
            display: none; flex-direction: column;
            padding: 20px 24px 30px;
            transition: background 1.2s ease;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            overflow-y: auto;
        }
        #full-player.open { display: flex; }

        .fp-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .fp-btn { background: none; border: none; color: rgba(255,255,255,0.7);
                  font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .fp-btn:hover { color: #fff; }
        .fp-label { font-size: 0.65rem; letter-spacing: 2px; font-weight: 800; color: rgba(255,255,255,0.5); }

        .fp-cover-wrap { text-align: center; margin-bottom: 24px; position: relative; display: inline-block; }
        #fp-cover {
            width: min(80vw, 280px); height: min(80vw, 280px);
            object-fit: cover; border-radius: 10px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            display: block; margin: 0 auto;
        }
        .fp-eq-overlay {
            position: absolute; bottom: 10px; left: 10px;
            display: none; gap: 3px; align-items: flex-end;
        }
        .fp-eq-overlay.playing { display: flex; }

        .fp-info { text-align: center; margin-bottom: 20px; }
        #fp-title { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }
        #fp-artist { font-size: 0.9rem; color: rgba(255,255,255,0.55); margin-top: 6px; }

        .fp-progress-bg {
            width: 100%; height: 4px; background: rgba(255,255,255,0.15);
            border-radius: 2px; cursor: pointer; margin-bottom: 6px;
        }
        #fp-progress-bar { height: 100%; background: #fff; border-radius: 2px; width: 0%; pointer-events: none; }
        .fp-times { display: flex; justify-content: space-between; font-size: 0.68rem; color: rgba(255,255,255,0.4); }

        .fp-controls {
            display: flex; align-items: center; justify-content: space-around;
            margin-top: 20px;
        }
        .fp-ctrl { background: none; border: none; color: rgba(255,255,255,0.6);
                   font-size: 1.2rem; cursor: pointer; transition: 0.2s;
                   width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .fp-ctrl:hover { color: #fff; }
        .fp-ctrl.active { color: #1DB954; }
        .fp-play {
            width: 64px; height: 64px; border-radius: 50%;
            background: #fff; color: #000; border: none;
            font-size: 1.5rem; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .fp-play:hover { transform: scale(1.06); }

        /* ── FLOATING MINI PLAYER ── */
        #float-bar {
            position: fixed; bottom: 60px; left: 0; right: 0; z-index: 2000;
            background: rgba(18,18,18,0.97); backdrop-filter: blur(10px);
            border-top: 2px solid #1DB954;
            display: none;
        }
        #float-bar.visible { display: block; }
        .fb-inner {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; cursor: pointer;
        }
        #fb-cover { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .fb-info { flex: 1; overflow: hidden; }
        #fb-title { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #fb-artist { font-size: 0.65rem; color: #1DB954; font-weight: 700; }
        .fb-btn { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 4px 8px; }
        .fb-progress-bg { width: 100%; height: 2px; background: #1a1a1a; }
        #fb-progress { width: 0%; height: 100%; background: #1DB954; }

        /* ── TABBAR SPACER ── */
        .tabbar-spacer { height: 60px; }

        /* VIDEO LINK BANNER */
        .video-banner {
            margin: 14px 16px 0;
            background: #0d0d0d; border: 1px solid #222; border-left: 3px solid #E50914;
            border-radius: 10px; padding: 12px 14px;
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; cursor: pointer; transition: 0.2s;
        }
        .video-banner:hover { border-left-color: #ff3333; transform: translateX(3px); }
        .video-banner .vb-icon { font-size: 1.4rem; color: #E50914; flex-shrink: 0; }
        .video-banner .vb-text .vb-label { font-size: 0.68rem; color: #E50914; font-weight: 800; letter-spacing: 1px; }
        .video-banner .vb-text .vb-desc { font-size: 0.8rem; font-weight: 700; color: #fff; margin-top: 2px; }
        .video-banner .vb-arrow { margin-left: auto; color: #444; font-size: 0.9rem; }
    </style>
</head>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ── STATE ──
        const ra = document.getElementById('real-audio');
        let allTracks = [];
        let filteredTracks = [];
        let currentIdx = -1;
        let isShuffle = false;
        let isRepeat = false;
        let currentFilter = 'all';

        const fmt = s => {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        };

        // ── LOAD DATA ──
        async function loadTracks() {
            try {
                const snap = await getDocs(query(collection(db, "podcasts"), orderBy("timestamp", "desc")));
                allTracks = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.mediaType === 'audio') allTracks.push({ id: doc.id, ...d });
                });
                renderList();
            } catch(e) {
                console.error("Error:", e);
                document.getElementById('skeleton-list').style.display = 'none';
                document.getElementById('track-list').style.display = 'block';
                document.getElementById('track-list').innerHTML =
                    `<div style="text-align:center;padding:40px;color:#444;"><i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;margin-bottom:10px;display:block;"></i><p>Gagal memuat musik.</p></div>`;
            }
        }

        // ── RENDER LIST ──
        function renderList() {
            document.getElementById('skeleton-list').style.display = 'none';
            const list = document.getElementById('track-list');
            list.style.display = 'block';

            filteredTracks = currentFilter === 'old' ? [...allTracks].reverse() : [...allTracks];
            document.getElementById('track-count').textContent = `${filteredTracks.length} lagu`;

            if (!filteredTracks.length) {
                list.innerHTML = `<div style="text-align:center;padding:50px 20px;color:#444;">
                    <i class="fa-solid fa-music" style="font-size:2.5rem;margin-bottom:12px;display:block;"></i>
                    <p>Belum ada musik tersedia.</p></div>`;
                return;
            }

            list.innerHTML = filteredTracks.map((d, i) => `
                <div class="track-item ${currentIdx !== -1 && filteredTracks[currentIdx]?.id === d.id ? 'playing' : ''}"
                     id="track-row-${d.id}" onclick="playTrack(${i})">
                    <div class="track-num">
                        <span class="track-num-num">${i + 1}</span>
                        <div class="track-num-eq">
                            <div class="tne-bar" style="height:6px"></div>
                            <div class="tne-bar" style="height:12px"></div>
                            <div class="tne-bar" style="height:8px"></div>
                        </div>
                    </div>
                    <img src="${d.thumb || 'https://via.placeholder.com/46?text=♪'}" class="track-thumb" loading="lazy">
                    <div class="track-info">
                        <div class="track-title">${d.title || 'Untitled'}</div>
                        <div class="track-host">${d.host || 'Admin'}</div>
                    </div>
                    <button class="track-more" onclick="event.stopPropagation()"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            `).join('');
        }

        // ── PLAY TRACK ──
        window.playTrack = function(idx) {
            const d = filteredTracks[idx];
            if (!d) return;
            currentIdx = idx;

            // Resolve URL
            let url = d.link || '';
            if (url.includes('dropbox.com')) url = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('dl=0', 'raw=1');
            else if (url.includes('drive.google.com')) {
                const fid = url.includes('/file/d/') ? url.split('/file/d/')[1].split('/')[0] : (url.split('id=')[1]?.split('&')[0] || '');
                url = `https://drive.google.com/uc?export=download&id=${fid}`;
            }

            ra.src = url;
            ra.load();
            ra.play();

            updateUI(d);
            highlightRow(d.id);
            setDynamicBg(d.thumb || '');
        };

        function updateUI(d) {
            const cover = d.thumb || 'https://via.placeholder.com/140?text=♪';
            const title = d.title || 'Untitled';
            const artist = d.host || 'Admin';

            // Stage
            document.getElementById('idle-msg').style.display = 'none';
            document.getElementById('audio-player').classList.add('active');
            document.getElementById('ap-cover').src = cover;
            document.getElementById('ap-title').textContent = title;
            document.getElementById('ap-artist').textContent = artist;

            // Float bar
            document.getElementById('float-bar').classList.add('visible');
            document.getElementById('fb-cover').src = cover;
            document.getElementById('fb-title').textContent = title;
            document.getElementById('fb-artist').textContent = artist;

            // Full player
            document.getElementById('fp-cover').src = cover;
            document.getElementById('fp-title').textContent = title;
            document.getElementById('fp-artist').textContent = artist;
        }

        function highlightRow(id) {
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            const row = document.getElementById('track-row-' + id);
            if (row) {
                row.classList.add('playing');
                row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // ── DYNAMIC BACKGROUND ──
        function setDynamicBg(src) {
            if (!src) return;
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.src = src;
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = 1; c.height = 1;
                const ctx = c.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const grad = `linear-gradient(180deg, rgb(${r},${g},${b}) 0%, #000 100%)`;
                document.getElementById('player-stage').style.background = grad;
                document.getElementById('full-player').style.background = grad;
            };
        }

        // ── CONTROLS ──
        window.toggleAudio = function(e) {
            if (e) e.stopPropagation();
            if (ra.paused) ra.play(); else ra.pause();
        };

        window.nextTrack = function(e) {
            if (e) e.stopPropagation();
            if (!filteredTracks.length) return;
            if (isShuffle) currentIdx = Math.floor(Math.random() * filteredTracks.length);
            else currentIdx = (currentIdx + 1) % filteredTracks.length;
            playTrack(currentIdx);
        };

        window.prevTrack = function(e) {
            if (e) e.stopPropagation();
            if (!filteredTracks.length) return;
            if (ra.currentTime > 3) { ra.currentTime = 0; return; }
            currentIdx = (currentIdx - 1 + filteredTracks.length) % filteredTracks.length;
            playTrack(currentIdx);
        };

        window.toggleShuffle = function() {
            isShuffle = !isShuffle;
            document.getElementById('btn-shuf')?.classList.toggle('active', isShuffle);
            document.getElementById('fp-shuf')?.classList.toggle('active', isShuffle);
        };

        window.toggleRepeat = function() {
            isRepeat = !isRepeat;
            document.getElementById('btn-rep')?.classList.toggle('active', isRepeat);
            document.getElementById('fp-rep')?.classList.toggle('active', isRepeat);
        };

        // ── AUDIO EVENTS ──
        ra.onplay = () => {
            const pi = 'fa-solid fa-pause';
            ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el = document.getElementById(id); if(el) el.className = pi; });
            ['sp-eq','fp-eq'].forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('playing'); });
        };

        ra.onpause = () => {
            const pi = 'fa-solid fa-play';
            ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el = document.getElementById(id); if(el) el.className = pi; });
            ['sp-eq','fp-eq'].forEach(id => { const el = document.getElementById(id); if(el) el.classList.remove('playing'); });
        };

        ra.ontimeupdate = () => {
            const pct = (ra.currentTime / ra.duration) * 100 || 0;
            const cur = fmt(ra.currentTime);
            const tot = fmt(ra.duration);

            ['ap-progress-bar','fb-progress','fp-progress-bar'].forEach(id => {
                const el = document.getElementById(id); if(el) el.style.width = pct + '%';
            });
            ['t-cur','fp-cur'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = cur; });
            ['t-tot','fp-tot'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = tot; });
        };

        ra.onended = () => {
            if (isRepeat) { ra.currentTime = 0; ra.play(); }
            else window.nextTrack();
        };

        // ── SEEK ──
        document.getElementById('sp-progress-bg').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            ra.currentTime = ((e.clientX - rect.left) / rect.width) * ra.duration;
        });
        window.seekFromFP = e => {
            const rect = e.currentTarget.getBoundingClientRect();
            ra.currentTime = ((e.clientX - rect.left) / rect.width) * ra.duration;
        };

        // ── FULL PLAYER ──
        window.openFullPlayer = function() { document.getElementById('full-player').classList.add('open'); };
        window.closeFullPlayer = function() { document.getElementById('full-player').classList.remove('open'); };

        // ── FILTER ──
        window.setFilter = function(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        };

        // ── INIT ──
        loadTracks();
    </script>
</body>
</html>
