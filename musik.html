<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000">
    <title>SMIPRO Tunes – STREETART.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
        body { background:#000; color:#fff; font-family:'Segoe UI',sans-serif; overflow-x:hidden; }

        /* NAVBAR */
        .mu-nav {
            position:fixed; top:0; left:0; right:0; z-index:3000;
            display:flex; align-items:center; gap:10px; padding:10px 14px;
            background:rgba(0,0,0,0.94); backdrop-filter:blur(12px);
            border-bottom:1px solid #1a1a1a;
        }
        .btn-back {
            background:none; border:none; color:#fff; font-size:1rem;
            cursor:pointer; display:flex; align-items:center; gap:6px;
            font-weight:700; padding:4px 8px 4px 0; white-space:nowrap;
            text-decoration:none;
        }
        .nav-divider { width:1px; height:20px; background:#2a2a2a; }
        .nav-logo { display:flex; align-items:center; gap:7px; text-decoration:none; }
        .nav-logo img { height:26px; }
        .nav-logo span { font-size:0.82rem; font-weight:800; letter-spacing:1px; }
        .nav-tag { margin-left:auto; font-size:0.7rem; font-weight:800;
                   letter-spacing:2px; color:#1DB954; }

        /* PLAYER STAGE */
        #player-stage {
            margin-top:53px;
            min-height:260px;
            display:flex; align-items:center; justify-content:center;
            background:linear-gradient(180deg,#1a1a1a 0%,#000 100%);
            transition:background 1.2s ease;
            padding:28px 20px 18px;
        }
        .idle-msg { text-align:center; opacity:0.3; }
        .idle-msg i { font-size:3rem; color:#1DB954; display:block; margin-bottom:10px; }
        .idle-msg p { font-size:0.82rem; }

        /* AUDIO PLAYER */
        #audio-player { display:none; width:100%; max-width:680px; }
        #audio-player.on { display:block; }

        .sp-top { display:flex; align-items:flex-end; gap:20px; margin-bottom:18px; }
        .sp-cover-box { position:relative; flex-shrink:0; }
        #ap-cover {
            width:120px; height:120px; object-fit:cover; border-radius:8px; display:block;
            box-shadow:0 16px 40px rgba(0,0,0,0.6);
        }
        @media(min-width:580px){ #ap-cover{ width:160px; height:160px; } }

        /* Equalizer on cover */
        .eq-wrap {
            position:absolute; bottom:8px; left:8px;
            display:none; gap:3px; align-items:flex-end;
        }
        .eq-wrap.go { display:flex; }
        .eq-b { width:3px; background:#1DB954; border-radius:2px; animation:eq 0.7s infinite ease-in-out; }
        .eq-b:nth-child(1){ animation-delay:0s; }
        .eq-b:nth-child(2){ animation-delay:0.15s; }
        .eq-b:nth-child(3){ animation-delay:0.3s; }
        .eq-b:nth-child(4){ animation-delay:0.1s; }
        @keyframes eq{ 0%,100%{height:3px} 50%{height:16px} }

        .sp-info { flex:1; overflow:hidden; }
        .sp-lbl { font-size:0.6rem; font-weight:800; letter-spacing:2px; color:rgba(255,255,255,0.4); margin-bottom:6px; }
        #ap-title {
            font-size:clamp(1.3rem,4.5vw,2.4rem); font-weight:900;
            line-height:1.1; letter-spacing:-0.5px;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        #ap-artist { font-size:0.85rem; color:rgba(255,255,255,0.6); margin-top:6px; font-weight:600; }

        /* PROGRESS */
        .sp-prog-wrap { margin-top:14px; }
        .sp-prog-bg {
            width:100%; height:4px; background:rgba(255,255,255,0.12);
            border-radius:2px; cursor:pointer; position:relative;
        }
        #ap-prog { height:100%; background:#fff; border-radius:2px; width:0%; pointer-events:none; }
        .sp-times { display:flex; justify-content:space-between;
                    font-size:0.66rem; color:rgba(255,255,255,0.35); margin-top:5px; }

        /* CONTROLS */
        .sp-ctrls {
            display:flex; align-items:center; justify-content:center;
            gap:16px; margin-top:16px;
        }
        .c-btn {
            background:none; border:none; color:rgba(255,255,255,0.55);
            font-size:1.05rem; cursor:pointer; transition:0.18s;
            width:34px; height:34px; display:flex; align-items:center; justify-content:center;
        }
        .c-btn:hover { color:#fff; transform:scale(1.1); }
        .c-btn.on { color:#1DB954; }
        .btn-play {
            width:54px; height:54px; border-radius:50%;
            background:#fff; color:#000; border:none;
            font-size:1.2rem; cursor:pointer; transition:0.2s;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 14px rgba(0,0,0,0.4);
        }
        .btn-play:hover { transform:scale(1.06); background:#e8e8e8; }
        .btn-play:active { transform:scale(0.95); }

        audio { display:none; }

        /* VIDEO BANNER */
        .video-banner {
            margin:13px 14px 0;
            background:#0d0d0d; border:1px solid #1e1e1e; border-left:3px solid #E50914;
            border-radius:10px; padding:11px 14px;
            display:flex; align-items:center; gap:12px;
            text-decoration:none; transition:0.2s;
        }
        .video-banner:hover { border-left-color:#ff3333; transform:translateX(2px); }
        .video-banner .vb-icon { font-size:1.3rem; color:#E50914; flex-shrink:0; }
        .video-banner .vb-lbl { font-size:0.62rem; color:#E50914; font-weight:800; letter-spacing:1px; }
        .video-banner .vb-desc { font-size:0.78rem; font-weight:700; color:#fff; margin-top:2px; }
        .video-banner .vb-arr { margin-left:auto; color:#333; font-size:0.85rem; }

        /* FILTER */
        .filter-bar {
            position:sticky; top:53px; z-index:200;
            display:flex; gap:8px; padding:9px 14px;
            background:rgba(0,0,0,0.96); backdrop-filter:blur(8px);
            border-bottom:1px solid #1a1a1a; overflow-x:auto;
        }
        .filter-bar::-webkit-scrollbar { display:none; }
        .f-chip {
            flex-shrink:0; padding:6px 16px; border-radius:20px;
            background:#181818; border:1px solid #282828;
            color:#777; font-size:0.76rem; font-weight:700; cursor:pointer; transition:0.18s;
        }
        .f-chip.active { background:#1DB954; color:#000; border-color:#1DB954; }

        /* SECTION HEADER */
        .sec-hdr { padding:18px 14px 8px; display:flex; align-items:baseline; gap:10px; }
        .sec-hdr h2 { font-size:1rem; font-weight:800; }
        .sec-hdr .cnt { font-size:0.68rem; color:#444; }

        /* TRACK LIST */
        #track-list { padding:0 6px 150px; }
        .track-row {
            display:flex; align-items:center; gap:12px;
            padding:9px 8px; border-radius:8px; cursor:pointer; transition:background 0.15s;
        }
        .track-row:hover { background:rgba(255,255,255,0.06); }
        .track-row.playing { background:rgba(29,185,84,0.08); }

        .tr-num {
            width:24px; text-align:center; font-size:0.78rem;
            color:rgba(255,255,255,0.35); flex-shrink:0; font-weight:600;
        }
        .track-row.playing .tr-num { color:#1DB954; }
        .tr-num .num-n { display:block; }
        .tr-num .num-eq { display:none; align-items:flex-end; gap:2px; height:14px; }
        .track-row.playing .tr-num .num-n { display:none; }
        .track-row.playing .tr-num .num-eq { display:flex; }
        .ne-b { width:2px; background:#1DB954; border-radius:1px; animation:eq 0.7s infinite ease-in-out; }
        .ne-b:nth-child(1){ animation-delay:0s; }
        .ne-b:nth-child(2){ animation-delay:0.2s; }
        .ne-b:nth-child(3){ animation-delay:0.1s; }

        .tr-img { width:44px; height:44px; border-radius:6px; object-fit:cover; flex-shrink:0; }
        .tr-info { flex:1; overflow:hidden; }
        .tr-title {
            font-size:0.83rem; font-weight:700;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .track-row.playing .tr-title { color:#1DB954; }
        .tr-host { font-size:0.68rem; color:rgba(255,255,255,0.38); margin-top:2px; }
        .tr-dot {
            background:none; border:none; color:rgba(255,255,255,0.25);
            font-size:0.85rem; cursor:pointer; padding:4px; flex-shrink:0;
        }
        .tr-dot:hover { color:#fff; }
        .tr-share {
            background:none; border:none; color:rgba(255,255,255,0.3);
            font-size:0.85rem; cursor:pointer; padding:4px 6px; flex-shrink:0;
            transition:color 0.15s;
        }
        .tr-share:hover { color:#1DB954; }

        /* SKELETON */
        .skel-list { padding:0 14px; }
        .skel-row { display:flex; gap:12px; padding:11px 0; align-items:center; }
        .skel-n { width:22px; height:12px; border-radius:3px; background:#181818; flex-shrink:0; }
        .skel-sq { width:44px; height:44px; border-radius:6px; flex-shrink:0;
                   background:linear-gradient(90deg,#181818 25%,#222 50%,#181818 75%);
                   background-size:200%; animation:shim 1.4s infinite; }
        @keyframes shim{ 0%{background-position:200% 0}100%{background-position:-200% 0} }
        .skel-lines { flex:1; }
        .skel-ln { height:10px; border-radius:3px; background:#181818; margin-bottom:6px; }
        .skel-ln.s { width:50%; }

        /* FLOATING MINI PLAYER */
        #float-bar {
            position:fixed; bottom:60px; left:0; right:0; z-index:2000;
            background:rgba(14,14,14,0.97); backdrop-filter:blur(10px);
            border-top:2px solid #1DB954; display:none;
        }
        #float-bar.on { display:block; animation:slideUp 0.3s ease; }
        @keyframes slideUp{ from{transform:translateY(100%)} to{transform:translateY(0)} }
        .fb-row {
            display:flex; align-items:center; gap:10px;
            padding:8px 12px; cursor:pointer;
        }
        #fb-cover { width:40px; height:40px; border-radius:5px; object-fit:cover; flex-shrink:0; }
        .fb-info { flex:1; overflow:hidden; }
        #fb-title { font-size:0.78rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        #fb-artist { font-size:0.62rem; color:#1DB954; font-weight:700; }
        .fb-btn { background:none; border:none; color:#fff; font-size:1.25rem; cursor:pointer; padding:4px 8px; }
        .fb-prog-bg { height:2px; background:#1a1a1a; }
        #fb-prog { height:100%; background:#1DB954; width:0%; }

        /* FULL PLAYER OVERLAY */
        #full-player {
            position:fixed; inset:0; z-index:9000;
            display:none; flex-direction:column;
            padding:20px 22px 30px;
            background:linear-gradient(180deg,#1a1a1a 0%,#000 100%);
            transition:background 1.2s ease; overflow-y:auto;
        }
        #full-player.open { display:flex; }
        .fp-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .fp-btn { background:none; border:none; color:rgba(255,255,255,0.65);
                  font-size:1.3rem; cursor:pointer; }
        .fp-lbl { font-size:0.62rem; letter-spacing:2px; font-weight:800; color:rgba(255,255,255,0.4); }
        .fp-cover-box { text-align:center; margin-bottom:20px; position:relative; display:inline-block; width:100%; }
        #fp-cover {
            width:min(78vw,260px); height:min(78vw,260px); object-fit:cover;
            border-radius:10px; box-shadow:0 24px 60px rgba(0,0,0,0.7);
            display:block; margin:0 auto;
        }
        .fp-eq-box {
            position:absolute; bottom:10px; left:50%; transform:translateX(-50%) translateX(-min(39vw,130px));
            display:none; gap:3px; align-items:flex-end;
        }
        .fp-eq-box.go { display:flex; }
        .fp-info { text-align:center; margin-bottom:18px; }
        #fp-title { font-size:1.5rem; font-weight:900; letter-spacing:-0.3px; }
        #fp-artist { font-size:0.88rem; color:rgba(255,255,255,0.5); margin-top:5px; }
        .fp-prog-bg {
            width:100%; height:4px; background:rgba(255,255,255,0.12);
            border-radius:2px; cursor:pointer; margin-bottom:5px;
        }
        #fp-prog { height:100%; background:#fff; border-radius:2px; width:0%; pointer-events:none; }
        .fp-times { display:flex; justify-content:space-between;
                    font-size:0.65rem; color:rgba(255,255,255,0.35); margin-bottom:18px; }
        .fp-ctrls {
            display:flex; align-items:center; justify-content:space-around;
        }
        .fp-c { background:none; border:none; color:rgba(255,255,255,0.55);
                font-size:1.1rem; cursor:pointer; transition:0.18s;
                width:38px; height:38px; display:flex; align-items:center; justify-content:center; }
        .fp-c:hover { color:#fff; }
        .fp-c.on { color:#1DB954; }
        .fp-play {
            width:60px; height:60px; border-radius:50%;
            background:#fff; color:#000; border:none;
            font-size:1.4rem; cursor:pointer; transition:0.2s;
            display:flex; align-items:center; justify-content:center;
        }
        .fp-play:hover { transform:scale(1.06); }

        .tabbar-spacer { height:60px; }
    </style>
</head>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const ra = document.getElementById('real-audio');
    let allTracks = [];
    let filteredTracks = [];
    let currentIdx = -1;
    let isShuffle = false;
    let isRepeat = false;
    let currentFilter = 'all';

    const fmt = s => {
        if (!s || isNaN(s)) return '0:00';
        const m = Math.floor(s/60), sec = Math.floor(s%60);
        return `${m}:${sec<10?'0':''}${sec}`;
    };

    // RESOLVE AUDIO URL (Dropbox / Drive / Direct)
    function resolveUrl(url) {
        if (!url) return '';
        if (url.includes('dropbox.com'))
            return url.replace('www.dropbox.com','dl.dropboxusercontent.com').replace('dl=0','raw=1');
        if (url.includes('drive.google.com')) {
            const fid = url.includes('/file/d/')
                ? url.split('/file/d/')[1].split('/')[0]
                : (url.split('id=')[1]?.split('&')[0] || '');
            return fid ? `https://drive.google.com/uc?export=download&id=${fid}` : url;
        }
        return url;
    }

    // SHARE LAGU
    window.shareTrack = function(e, idx) {
        e.stopPropagation();
        const d = filteredTracks[idx];
        if (!d) return;

        const title  = d.title  || 'Untitled';
        const artist = d.host   || 'Admin';
        // Link share: URL halaman ini + query param id lagu
        const shareUrl  = window.location.href.split('?')[0] + '?play=' + encodeURIComponent(d.id);
        const shareText = '🎵 ' + title + '\nOleh: ' + artist + '\nDengarkan di SMIPRO Tunes STREETART.ID';

        if (navigator.share) {
            // Native share sheet (HP Android/iOS)
            navigator.share({
                title : title + ' – SMIPRO Tunes',
                text  : shareText,
                url   : shareUrl
            }).catch(() => {});
        } else {
            // Fallback desktop: copy ke clipboard
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    showToast('✅ Link disalin ke clipboard!');
                }).catch(() => fallbackCopy(shareUrl));
            } else {
                fallbackCopy(shareUrl);
            }
        }
    };

    function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('✅ Link disalin!'); }
        catch(e) { showToast('Salin manual: ' + text); }
        document.body.removeChild(ta);
    }

    function showToast(msg) {
        let t = document.getElementById('toast-msg');
        if (!t) {
            t = document.createElement('div');
            t.id = 'toast-msg';
            t.style.cssText = 'position:fixed;bottom:130px;left:50%;transform:translateX(-50%);background:#1DB954;color:#000;font-size:0.78rem;font-weight:700;padding:9px 18px;border-radius:99px;z-index:9999;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,0.4);transition:opacity 0.3s;';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.opacity = '1';
        clearTimeout(t._tm);
        t._tm = setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }

        // LOAD
    async function loadTracks() {
        try {
            const snap = await getDocs(query(collection(db, "podcasts"), orderBy("timestamp","desc")));
            allTracks = [];
            snap.forEach(doc => {
                const d = doc.data();
                if (d.mediaType === 'audio') allTracks.push({ id:doc.id, ...d });
            });
            renderList();
        } catch(e) {
            console.error("Error:", e);
            document.getElementById('skel-list').style.display = 'none';
            const tl = document.getElementById('track-list');
            tl.style.display = 'block';
            tl.innerHTML = `<div style="text-align:center;padding:40px;color:#444;">
                <i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                <p>Gagal memuat musik.</p></div>`;
        }
    }

    function renderList() {
        document.getElementById('skel-list').style.display = 'none';
        const tl = document.getElementById('track-list');
        tl.style.display = 'block';
        filteredTracks = currentFilter === 'old' ? [...allTracks].reverse() : [...allTracks];
        document.getElementById('track-count').textContent = filteredTracks.length + ' lagu';

        if (!filteredTracks.length) {
            tl.innerHTML = `<div style="text-align:center;padding:50px 20px;color:#444;">
                <i class="fa-solid fa-music" style="font-size:2.5rem;display:block;margin-bottom:12px;"></i>
                <p>Belum ada musik tersedia.</p></div>`;
            return;
        }

        tl.innerHTML = filteredTracks.map((d,i) => {
            const isPlaying = (currentIdx === i);
            return `
            <div class="track-row ${isPlaying?'playing':''}" id="tr-${d.id}" onclick="playTrack(${i})">
                <div class="tr-num">
                    <span class="num-n">${i+1}</span>
                    <span class="num-eq">
                        <span class="ne-b"></span><span class="ne-b"></span><span class="ne-b"></span>
                    </span>
                </div>
                <img class="tr-img" src="${d.thumb || 'https://via.placeholder.com/44?text=%E2%99%AA'}" loading="lazy"
                     onerror="this.src='https://via.placeholder.com/44?text=%E2%99%AA'">
                <div class="tr-info">
                    <div class="tr-title">${d.title || 'Untitled'}</div>
                    <div class="tr-host">${d.host || 'Admin'}</div>
                </div>
                <button class="tr-share" onclick="shareTrack(event,${i})" title="Bagikan lagu ini"><i class="fa-solid fa-share-nodes"></i></button>
            </div>`;
        }).join('');
    }

    window.playTrack = function(idx) {
        const d = filteredTracks[idx];
        if (!d) return;
        currentIdx = idx;
        ra.src = resolveUrl(d.link || d.url || '');
        ra.load();
        ra.play().catch(e => console.error("Play error:", e));
        updateAllUI(d);
        highlightRow(d.id);
        setDynBg(d.thumb || '');
    };

    function updateAllUI(d) {
        const cover = d.thumb || 'https://via.placeholder.com/140?text=%E2%99%AA';
        const title = d.title || 'Untitled';
        const artist = d.host || 'Admin';
        // Stage
        document.getElementById('idle-msg').style.display = 'none';
        document.getElementById('audio-player').classList.add('on');
        document.getElementById('ap-cover').src = cover;
        document.getElementById('ap-title').textContent = title;
        document.getElementById('ap-artist').textContent = artist;
        // Float bar
        document.getElementById('float-bar').classList.add('on');
        document.getElementById('fb-cover').src = cover;
        document.getElementById('fb-title').textContent = title;
        document.getElementById('fb-artist').textContent = artist;
        // Full player
        document.getElementById('fp-cover').src = cover;
        document.getElementById('fp-title').textContent = title;
        document.getElementById('fp-artist').textContent = artist;
    }

    function highlightRow(id) {
        document.querySelectorAll('.track-row').forEach(el => el.classList.remove('playing'));
        const row = document.getElementById('tr-' + id);
        if (row) { row.classList.add('playing'); row.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    }

    function setDynBg(src) {
        if (!src) return;
        const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = src;
        img.onload = () => {
            const c = document.createElement('canvas'); c.width=1; c.height=1;
            const ctx = c.getContext('2d'); ctx.drawImage(img,0,0,1,1);
            const [r,g,b] = ctx.getImageData(0,0,1,1).data;
            const grad = `linear-gradient(180deg,rgb(${r},${g},${b}) 0%,#000 100%)`;
            document.getElementById('player-stage').style.background = grad;
            document.getElementById('full-player').style.background = grad;
        };
    }

    // CONTROLS
    window.toggleAudio = function(e) {
        if (e) e.stopPropagation();
        if (currentIdx < 0 && filteredTracks.length) { playTrack(0); return; }
        if (ra.paused) ra.play(); else ra.pause();
    };
    window.nextTrack = function(e) {
        if (e) e.stopPropagation();
        if (!filteredTracks.length) return;
        if (isShuffle) currentIdx = Math.floor(Math.random()*filteredTracks.length);
        else currentIdx = (currentIdx+1) % filteredTracks.length;
        playTrack(currentIdx);
    };
    window.prevTrack = function(e) {
        if (e) e.stopPropagation();
        if (!filteredTracks.length) return;
        if (ra.currentTime > 3) { ra.currentTime=0; return; }
        currentIdx = (currentIdx-1+filteredTracks.length) % filteredTracks.length;
        playTrack(currentIdx);
    };
    window.toggleShuffle = function() {
        isShuffle = !isShuffle;
        ['btn-shuf','fp-shuf'].forEach(id => document.getElementById(id)?.classList.toggle('on',isShuffle));
    };
    window.toggleRepeat = function() {
        isRepeat = !isRepeat;
        ['btn-rep','fp-rep'].forEach(id => document.getElementById(id)?.classList.toggle('on',isRepeat));
    };

    // AUDIO EVENTS
    ra.onplay = () => {
        ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el=document.getElementById(id); if(el) el.className='fa-solid fa-pause'; });
        ['sp-eq','fp-eq'].forEach(id => document.getElementById(id)?.classList.add('go'));
    };
    ra.onpause = () => {
        ['ap-icon','fb-icon','fp-icon'].forEach(id => { const el=document.getElementById(id); if(el) el.className='fa-solid fa-play'; });
        ['sp-eq','fp-eq'].forEach(id => document.getElementById(id)?.classList.remove('go'));
    };
    ra.ontimeupdate = () => {
        const pct = (ra.currentTime/ra.duration)*100 || 0;
        const cur = fmt(ra.currentTime);
        const tot = fmt(ra.duration);
        ['ap-prog','fb-prog','fp-prog'].forEach(id => { const el=document.getElementById(id); if(el) el.style.width=pct+'%'; });
        ['t-cur','fp-cur'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=cur; });
        ['t-tot','fp-tot'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=tot; });
    };
    ra.onended = () => {
        if (isRepeat) { ra.currentTime=0; ra.play(); }
        else window.nextTrack();
    };

    // SEEK
    document.getElementById('sp-prog-bg').addEventListener('click', e => {
        const rect = e.currentTarget.getBoundingClientRect();
        if (ra.duration) ra.currentTime = ((e.clientX-rect.left)/rect.width)*ra.duration;
    });
    window.seekFP = e => {
        const rect = e.currentTarget.getBoundingClientRect();
        if (ra.duration) ra.currentTime = ((e.clientX-rect.left)/rect.width)*ra.duration;
    };

    // FULL PLAYER
    window.openFullPlayer = function() { document.getElementById('full-player').classList.add('open'); };
    window.closeFullPlayer = function() { document.getElementById('full-player').classList.remove('open'); };

    // FILTER
    window.setFilter = function(f,btn) {
        currentFilter = f;
        document.querySelectorAll('.f-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        renderList();
    };

    loadTracks();
</script>
</body>
</html>
