<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Performer - STREETART.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* NAV ATAS (pola sama seperti podcast.html biar konsisten) */
        .pf-nav{position:fixed;top:0;left:0;right:0;z-index:3000;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.94);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a}
        .pf-nav-div{flex:1}
        .pf-nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;margin-left:auto}
        .pf-nav-logo img{height:26px}
        .pf-nav-logo span{font-size:0.82rem;font-weight:800;letter-spacing:1px;color:#fff}
        .pf-nav-tag{font-size:0.6rem;font-weight:800;letter-spacing:1px;color:#E50914;padding:4px 10px;border:1px solid rgba(229,9,20,0.3);background:rgba(229,9,20,0.1);border-radius:20px;white-space:nowrap;}

        .pf-content{margin-top:70px;padding:0 16px 40px;}
        .pf-search{width:100%;padding:12px 16px;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:0.9rem;margin-bottom:20px;}
        .pf-search::placeholder{color:#666;}
        .pf-count{color:#666;font-size:0.78rem;margin-bottom:14px;}
    </style>
</head>
<body>

<nav class="pf-nav">
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
    <div class="pf-nav-div"></div>
    <span class="pf-nav-tag"><i class="fa-solid fa-guitar"></i> SEMUA PERFORMER</span>
</nav>

<div class="pf-content">
    <input type="text" id="pf-search" class="pf-search" placeholder="Cari nama performer..." oninput="filterPerformers(this.value)">
    <p class="pf-count" id="pf-count">Memuat performer...</p>
    <div class="performer-wrap" id="pf-container"></div>
</div>

<div class="tabbar-spacer"></div>
<nav class="bottom-tabbar">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="schedule.html"><i class="fa-solid fa-calendar-days"></i><span>Jadwal</span></a>
    <a href="podcast.html"><i class="fa-solid fa-music"></i><span>Galeri</span></a>
    <a href="radio.html"><i class="fa-solid fa-tower-broadcast"></i><span>Radio</span></a>
    <a href="login.html"><i class="fa-solid fa-user"></i><span>Akun</span></a>
</nav>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let allPerformers = [];

async function loadAllPerformers() {
    const container = document.getElementById('pf-container');
    const countEl = document.getElementById('pf-count');
    try {
        const q = query(collection(db, "performers"), orderBy("rating", "desc"));
        const snap = await getDocs(q);
        allPerformers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        countEl.textContent = allPerformers.length + ' performer';
        renderPerformers(allPerformers);
    } catch (e) {
        countEl.textContent = 'Gagal memuat data performer.';
        console.error(e);
    }
}

function renderPerformers(list) {
    const container = document.getElementById('pf-container');
    if (!list.length) {
        container.innerHTML = '<p style="text-align:center; width:100%; color:#666;">Performer tidak ditemukan.</p>';
        return;
    }
    const defaultImg = "https://placehold.co/150";
    container.innerHTML = list.map(data => `
        <div class="artist-card" onclick="location.href='profile.html?id=${data.id}'">
            <img src="${data.img || defaultImg}" class="artist-img">
            <div>${data.name}</div>
        </div>`).join('');
}

window.filterPerformers = function(keyword) {
    const k = (keyword || '').trim().toLowerCase();
    if (!k) return renderPerformers(allPerformers);
    renderPerformers(allPerformers.filter(p => (p.name || '').toLowerCase().includes(k)));
};

loadAllPerformers();
</script>

</body>
</html>
